<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EMO Agency • Commission &amp; Bonus VJ</title>

<!-- PWA manifest & icons -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

<!-- iOS / Add to Home Screen -->
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EMO Agency">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+Lao:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --ink:        #0B1220;
  --ink-2:      #101A2E;
  --ink-3:      #16223B;
  --line:       #233153;
  --gold:       #F5B82E;
  --gold-dim:   #8A6A22;
  --mint:       #2DD4A8;
  --coral:      #FF6B5E;
  --ice:        #6FB7FF;
  --rank1:      #5B21B6;
  --rank2:      #1D4ED8;
  --rank3:      #9A3412;
  --rank-other-bg:     #16223B;
  --rank-other-border: #233153;
  --text-hi:    #F4F2ED;
  --text-mid:   #B8C0D6;
  --text-low:   #71799A;
  --tier-c-lo:  #8C6A4E;
  --tier-c-hi:  #D9A65C;
  --tier-s-lo:  #9AAFC9;
  --tier-s-hi:  #B8E3FF;
  --hero-bg1:   #182441;
  --hero-bg2:   #0E1626;
  --hero-glow:  #F5B82E;
  --f-display: 'Sora', 'Noto Sans Lao', sans-serif;
  --f-body:    'Inter', 'Noto Sans Lao', sans-serif;
  --f-mono:    'JetBrains Mono', 'Noto Sans Lao', monospace;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --shadow-1: 0 4px 20px rgba(0,0,0,0.25);
  --shadow-2: 0 10px 40px rgba(0,0,0,0.35);
  --nav-h: 74px;
  --topbar-h: 56px;
  --rank1:      #5B21B6;
  --rank2:      #1D4ED8;
  --rank3:      #9A3412;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  background:
    radial-gradient(900px 500px at 100% -10%, rgba(245,184,46,0.07), transparent 60%),
    radial-gradient(700px 500px at -10% 100%, rgba(45,212,168,0.06), transparent 60%),
    var(--ink);
  color:var(--text-hi);
  font-family:var(--f-body);
  min-height:100vh;
  overscroll-behavior-y:none;
}
::selection{ background:rgba(245,184,46,0.3); }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }
::-webkit-scrollbar-track{ background:transparent; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; }
input,select,textarea{ font-family:inherit; }
:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; border-radius:6px; }
.mono{ font-family:var(--f-mono); font-feature-settings:"tnum" 1; }
.display{ font-family:var(--f-display); }
#app{ display:flex; min-height:100vh; }
.topbar{
  position:fixed; top:0; left:0; right:0; height:var(--topbar-h);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
  background:rgba(11,18,32,0.85);
  backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--line);
  z-index:40;
}
.topbar .brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:32px; height:32px; border-radius:9px;
  background:linear-gradient(145deg, var(--gold), #c98f1c);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--f-display); font-weight:800; font-size:15px; color:#21170a;
  box-shadow:0 2px 10px rgba(245,184,46,0.35);
  flex-shrink:0;
}
.brand-text{ display:flex; flex-direction:column; line-height:1.1; }
.brand-text b{ font-family:var(--f-display); font-size:14.5px; font-weight:700; letter-spacing:.2px; }
.brand-text span{ font-size:10.5px; color:var(--text-low); letter-spacing:.4px; }
.icon-btn{
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:1px solid transparent; color:var(--text-mid);
  transition:background .15s, color .15s;
}
.icon-btn:hover{ background:var(--ink-3); color:var(--text-hi); }
.icon-btn svg{ width:20px; height:20px; }
.tabbar{
  position:fixed; left:0; right:0; bottom:0; height:var(--nav-h);
  display:flex; z-index:40;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(14px) saturate(140%);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-item{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; color:var(--text-low); position:relative; border:none; background:none;
}
.tab-item svg{ width:21px; height:21px; transition:transform .15s; }
.tab-item span{ font-size:9.5px; font-weight:600; letter-spacing:.2px; margin-top:1px; }
.tab-emoji-box{
  width:30px !important; height:30px !important;
  display:flex; align-items:center; justify-content:center;
  font-size:30px !important; line-height:1;
  background: none; border:none; transition: transform .15s;
}
.tab-emoji-box img{
  width:120% !important;
  height:120% !important;
  object-fit:contain;
  transform: translateY(-3px);
}
.tab-item.active .tab-emoji-box{ transform: scale(1.12); }
.tab-item.active{ color:var(--gold); }
.tab-item.active svg{ transform:translateY(-2px); }
.sidebar{
  width:240px; flex-shrink:0;
  background:var(--ink-2); border-right:1px solid var(--line);
  padding:20px 14px; display:none; flex-direction:column; gap:4px;
  position:fixed; top:0; left:0; height:100vh; z-index:50;
  overflow-y:auto;
}
.sidebar .brand{ padding:6px 10px 22px; display:flex; align-items:center; gap:10px; }
.side-link{
  display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius-sm);
  color:var(--text-mid); font-size:14px; font-weight:600; background:none; border:none; width:100%; text-align:left;
}
.side-link svg{ width:18px; height:18px; flex-shrink:0; }
.side-link:hover{ background:var(--ink-3); color:var(--text-hi); }
.side-link.active{ background:linear-gradient(90deg, rgba(245,184,46,0.16), transparent); color:var(--gold); }
.side-section-label{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--text-low); padding:16px 12px 6px; }
.side-spacer{ flex:1; }
#main{
  flex:1; min-width:0;
  padding-top:calc(var(--topbar-h) + 14px);
  padding-bottom:calc(var(--nav-h) + 24px);
  padding-left:14px; padding-right:14px;
  max-width:1180px; margin:0 auto; width:100%;
}
.overlay{
  position:fixed; inset:0; background:rgba(5,8,16,0.6); backdrop-filter:blur(2px);
  opacity:0; pointer-events:none; transition:opacity .25s; z-index:60;
}
.overlay.show{ opacity:1; pointer-events:auto; }
.drawer{
  position:fixed; top:0; right:0; height:100%; width:84%; max-width:320px;
  background:var(--ink-2); border-left:1px solid var(--line);
  transform:translateX(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
  z-index:61; padding:18px 14px; overflow-y:auto;
  padding-top:calc(18px + env(safe-area-inset-top));
}
.drawer.show{ transform:translateX(0); }
.drawer-head{ display:flex; align-items:center; justify-content:space-between; padding:4px 6px 18px; }
.drawer-link{
  display:flex; align-items:center; gap:12px; padding:13px 12px; border-radius:var(--radius-sm);
  color:var(--text-mid); font-size:15px; font-weight:600; background:none; border:none; width:100%; text-align:left;
}
.drawer-link svg{ width:19px; height:19px; flex-shrink:0; }
.drawer-link:hover, .drawer-link.active{ background:var(--ink-3); color:var(--text-hi); }
.drawer-divider{ height:1px; background:var(--line); margin:10px 0; }
@media (min-width: 980px){
  .tabbar{ display:none; }
  .sidebar{ display:flex; }
  #main{ padding-left:254px; padding-right:24px; padding-bottom:32px; max-width:1320px; }
  .topbar{ padding-left:254px; }
  .topbar .brand{ display:none; }
  #pageTitleDesktop{ display:block !important; }
}
.page-head{ margin-bottom:18px; }
.page-head h1{ font-family:var(--f-display); font-size:22px; font-weight:700; margin:0 0 4px; }
.page-head p{ margin:0; color:var(--text-low); font-size:13.5px; }
.eyebrow{ font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--gold); margin:0 0 6px; }
.card{
  background:linear-gradient(165deg, var(--ink-3), var(--ink-2));
  border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:18px; box-shadow:var(--shadow-1);
  position:relative; overflow:hidden;
  backdrop-filter: blur(10px);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.card::before{
  content:''; position:absolute; inset:0; border-radius:inherit; padding:1px;
  background:linear-gradient(135deg, var(--gold) 0%, transparent 30%, transparent 70%, var(--mint) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  opacity:0; transition:opacity .25s;
}
.card:hover::before{ opacity:.35; }
.card:hover{ transform:translateY(-2px); box-shadow:0 8px 28px rgba(245,184,46,0.12); }
.btn-primary{
  background:linear-gradient(135deg, var(--gold), #ffdc7a 45%, #c98f1c);
  background-size:200% 200%;
  color:#21170a;
  box-shadow:0 4px 20px rgba(245,184,46,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  transition:filter .15s, transform .1s, background-position .4s;
}
.btn-primary:hover{ filter:brightness(1.08); background-position:100% 0; }
.card + .card{ margin-top:14px; }
.card-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.hero-balance{
  position:relative; overflow:hidden;
  background:
    var(--hero-bg-image, none),
    radial-gradient(180px 120px at 85% -20%, var(--hero-glow), transparent 55%)
    linear-gradient(165deg, var(--hero-bg1), var(--hero-bg2));
  background-size: cover, auto, auto;
  background-position: center, center, center;
  background-repeat: no-repeat, no-repeat, no-repeat;
  border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:22px 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.hero-balance::before{
  content:''; position:absolute; inset:0;
  background: var(--hero-overlay, rgba(0,0,0,0)); pointer-events:none;
}
.hero-balance .label{ color:var(--text-mid); font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
.hero-balance .amount{ font-family:var(--f-mono); font-size:38px; font-weight:700; letter-spacing:-1px; margin:6px 0 2px; display:flex; align-items:baseline; gap:8px; }
.hero-balance .amount small{ font-size:16px; color:var(--text-low); font-weight:600; }
.hero-balance .sub-stats{ display:flex; gap:18px; margin-top:16px; flex-wrap:wrap; }
.hero-balance .sub-stat{ display:flex; flex-direction:column; gap:2px; }
.hero-balance .sub-stat .v{ font-family:var(--f-mono); font-size:16px; font-weight:600; }
.hero-balance .sub-stat .l{ font-size:11px; color:var(--text-low); }
.stat-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:14px; align-items:stretch; }
@media (min-width:620px){ .stat-grid{ grid-template-columns:repeat(4,1fr); } }
.stat-grid > button.card{
  height:100%;
  min-height:96px;   /* ← ເພີ່ມແຖວນີ້ */
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  box-sizing:border-box;
}
.stat-grid > button.card p{
  margin:8px 0 0;
  flex:1;
}
.stat-card{ background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius-md); padding:14px 14px; }
.stat-card .l{ font-size:11.5px; color:var(--text-low); margin-bottom:6px; font-weight:600; }
.stat-card .v{ font-family:var(--f-mono); font-size:19px; font-weight:700; }
.stat-card .v.mint{ color:var(--mint); } .stat-card .v.gold{ color:var(--gold); }
.tier{ display:inline-flex; align-items:center; gap:5px; padding:3px 9px 3px 7px; border-radius:20px; font-family:var(--f-mono); font-size:12px; font-weight:700; letter-spacing:.3px; border:1px solid transparent; }
.tier .gem{ width:7px; height:7px; border-radius:2px; transform:rotate(45deg); flex-shrink:0; }
.tier.tier-none{ background:var(--ink-3); color:var(--text-low); border-color:var(--line); }
.tier.tier-none .gem{ background:var(--text-low); }
.tier.tier-c{ background:rgba(217,166,92,0.12); color:var(--tier-c-hi); border-color:rgba(217,166,92,0.35); }
.tier.tier-c .gem{ background:linear-gradient(135deg,var(--tier-c-lo),var(--tier-c-hi)); box-shadow:0 0 8px rgba(217,166,92,0.5); }
.tier.tier-s{ background:rgba(184,227,255,0.12); color:var(--tier-s-hi); border-color:rgba(184,227,255,0.35); }
.tier.tier-s .gem{ background:linear-gradient(135deg,var(--tier-s-lo),var(--tier-s-hi)); box-shadow:0 0 10px rgba(184,227,255,0.6); }
.vj-row{ display:flex; align-items:center; gap:12px; padding:12px 6px; border-bottom:1px solid var(--line); }
.vj-row:last-child{ border-bottom:none; }
.vj-avatar{ width:56px; height:56px; border-radius:50%; flex-shrink:0; background:linear-gradient(145deg, var(--ink-3), var(--ink)); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:var(--f-display); font-weight:700; font-size:20px; color:var(--text-mid); }
.vj-info{ flex:1; min-width:0; }
.vj-info .name{ font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.vj-info .meta{ font-size:11.5px; color:var(--text-low); margin-top:1px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.vj-amount{ text-align:right; flex-shrink:0; }
.vj-amount .usd{ font-family:var(--f-mono); font-weight:700; font-size:14.5px; color:var(--gold); }
.vj-amount .beans{ font-size:10.5px; color:var(--text-low); margin-top:1px; }
.chip{ display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:20px; font-size:12.5px; font-weight:600; background:var(--ink-3); border:1px solid var(--line); color:var(--text-mid); white-space:nowrap; }
.chip-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin:14px 0 6px; scrollbar-width:none; }
.chip-row::-webkit-scrollbar{ display:none; }
.chip.active{ background:rgba(245,184,46,0.14); border-color:rgba(245,184,46,0.4); color:var(--gold); }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:11px 18px; border-radius:12px; font-weight:700; font-size:14px; border:1px solid transparent; transition:filter .15s, transform .1s; }
.btn svg{ width:16px; height:16px; flex-shrink:0; }
.btn:active{ transform:scale(.97); }
.btn-ghost{ background:var(--ink-3); color:var(--text-hi); border-color:var(--line); }
.btn-ghost:hover{ background:#1b2944; }
.btn-danger{ background:rgba(255,107,94,0.12); color:var(--coral); border-color:rgba(255,107,94,0.35); }
.btn-danger:hover{ background:rgba(255,107,94,0.2); }
.btn-sm{ padding:7px 13px; font-size:12.5px; border-radius:9px; }
.btn-block{ width:100%; }
.btn-sm svg{ width:14px; height:14px; }
.btn:disabled{ opacity:.5; pointer-events:none; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12.5px; font-weight:600; color:var(--text-mid); margin-bottom:6px; }
.field input, .field select, .field textarea{ width:100%; background:#0B1220; border:1px solid var(--line); border-radius:10px; padding:11px 12px; color:#F4F2ED; font-size:14.5px; }
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--gold); }
.field-row{ display:flex; gap:10px; }
.field-row .field{ flex:1; }
.field-hint{ font-size:11.5px; color:var(--text-low); margin-top:5px; }
.search-bar{ display:flex; align-items:center; gap:10px; background:var(--ink-2); border:1px solid var(--line); border-radius:14px; padding:11px 14px; margin-bottom:4px; }
.search-bar svg{ width:18px; height:18px; color:var(--text-low); flex-shrink:0; }
.search-bar input{ flex:1; background:none; border:none; color:var(--text-hi); font-size:15px; outline:none; }
.table-wrap{ overflow-x:auto; border-radius:var(--radius-md); border:1px solid var(--line); }
table.data{ width:100%; border-collapse:collapse; font-size:13px; min-width:760px; }
table.data th{ text-align:left; padding:11px 12px; background:var(--ink-3); color:var(--text-low); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; position:sticky; top:0; }
table.data td{ padding:10px 12px; border-top:1px solid var(--line); white-space:nowrap; }
table.data tbody tr:hover{ background:rgba(255,255,255,0.02); }
table.data .num{ font-family:var(--f-mono); text-align:right; }
.empty-state{ text-align:center; padding:48px 20px; color:var(--text-low); }
.empty-state svg{ width:28px; height:28px; margin-bottom:10px; opacity:.5; }
.empty-state h3{ color:var(--text-mid); font-size:15px; margin:0 0 6px; }
.empty-state p{ font-size:13px; margin:0; max-width:280px; margin:0 auto; }
.skeleton{ background:linear-gradient(90deg, var(--ink-2) 25%, var(--ink-3) 37%, var(--ink-2) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:10px; }
@keyframes shimmer{ 0%{background-position:100% 50%;} 100%{background-position:0 50%;} }
.modal-overlay{ position:fixed; inset:0; background:rgba(5,8,16,0.65); backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center; z-index:80; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.show{ opacity:1; pointer-events:auto; }
.modal-sheet{ background:var(--ink-2); border:1px solid var(--line); border-radius:20px 20px 0 0; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:18px 18px calc(18px + env(safe-area-inset-bottom)); transform:translateY(30px); transition:transform .25s cubic-bezier(.2,.8,.2,1); }
.modal-overlay.show .modal-sheet{ transform:translateY(0); }
@media (min-width:620px){ .modal-overlay{ align-items:center; } .modal-sheet{ border-radius:20px; max-height:84vh; } }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal-head h3{ font-family:var(--f-display); font-size:17px; margin:0; }
.modal-actions{ display:flex; gap:10px; margin-top:18px; }
.modal-actions .btn{ flex:1; }
.toast{ background:var(--ink-3); border:1px solid var(--line); color:var(--text-hi); padding:11px 18px; border-radius:30px; font-size:13.5px; font-weight:600; box-shadow:var(--shadow-2); display:flex; align-items:center; gap:8px; animation:toastIn .25s ease; pointer-events:auto; }
.toast.success{ border-color:rgba(45,212,168,0.4); }
.toast.error{ border-color:rgba(255,107,94,0.4); }
.toast .dot-ico{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.toast.success .dot-ico{ background:var(--mint); }
.toast.error .dot-ico{ background:var(--coral); }
.toast.info .dot-ico{ background:var(--ice); }
@keyframes toastIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
.sync-dot{ width:7px; height:7px; border-radius:50%; background:var(--mint); display:inline-block; box-shadow:0 0 8px var(--mint); }
.sync-dot.syncing{ background:var(--gold); box-shadow:0 0 8px var(--gold); animation:pulse 1s infinite; }
.sync-dot.error{ background:var(--coral); box-shadow:0 0 8px var(--coral); }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }
.section-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-low); margin:22px 0 10px; }
.section-label:first-child{ margin-top:0; }
.login-wrap{ min-height:calc(100vh - var(--topbar-h)); display:flex; align-items:center; justify-content:center; padding:20px; }
.pre-login .sidebar, .pre-login .tabbar { display:none !important; }

function darkenHex(hex, amount) {
  hex = hex.replace('#','');
  if(hex.length !== 6) return '#888';
  let r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
  r = Math.max(0, Math.round(r*(1-amount))); g = Math.max(0, Math.round(g*(1-amount))); b = Math.max(0, Math.round(b*(1-amount)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

const API_BASE_URL = (window.APP_CONFIG && window.APP_CONFIG.API_BASE_URL) || '';

function checkApiConfigured(){
  const banner = document.getElementById('apiConfigBanner');
  if(!API_BASE_URL || API_BASE_URL.indexOf('script.google.com') === -1){
    if(banner) banner.classList.add('show');
    return false;
  }
  return true;
}

/**
 * ຮຽກ backend API. ອ່ານ (read-only) ໃຊ້ GET, ຂຽນ/ມີລະຫັດຜ່ານ ໃຊ້ POST.
 * fnName = ຊື່ action (ຕ້ອງກົງກັບ registry ໃນ Code.gs), args = array ຂອງ argument
 */
async function gasCall(fnName, ...args){
  if(!API_BASE_URL){
    throw new Error('API_BASE_URL ຍັງບໍ່ໄດ້ຕັ້ງຄ່າ — ແກ້ໄຂໃນ APP_CONFIG ດ້ານເທິງຂອງ index.html');
  }
  const WRITE_ACTIONS = new Set([
    'adminLogin','adminCreateMonth','adminDeleteMonth','adminSaveSummary',
    'adminSaveVj','adminDeleteVj','adminBulkImportVj',
    'saveThemeSettings','resetThemeSettings','saveBannersData',
    'askEmoAssistant',
    'adminSaveVjPhoto','adminDeleteVjPhoto',
    'adminSavePkCoverPhoto','adminSavePkMatchPhoto','adminDeletePkMatchPhoto',
    'adminLoginV2','adminSaveAdminAccount','adminDeleteAdminAccount',
    'adminSavePkFamilyTeams','adminSavePkFamilyRound','adminSetPkFamilyWinner','adminResetPkFamily','adminSavePkFamilyPool','adminSetPkFamilyMatchTime','adminSetPkFamilyScore',
  ]);
  const isWrite = WRITE_ACTIONS.has(fnName);

  let res, text;
  try{
    if(isWrite){
      // POST ດ້ວຍ Content-Type: text/plain ເພື່ອຫຼີກລ່ຽງ CORS preflight (Apps Script ບໍ່ຮອງຮັບ)
      res = await fetch(API_BASE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: fnName, args: args })
      });
    } else {
      const url = new URL(API_BASE_URL);
      url.searchParams.set('action', fnName);
      if(args && args.length) url.searchParams.set('args', JSON.stringify(args));
      res = await fetch(url.toString(), { method: 'GET' });
    }
    text = await res.text();
  }catch(networkErr){
    throw new Error('ເຊື່ອມຕໍ່ API ບໍ່ໄດ້ (network/CORS): ' + networkErr.message);
  }

  let payload;
  try{ payload = JSON.parse(text); }
  catch(parseErr){ throw new Error('API ຕອບກັບບໍ່ແມ່ນ JSON ທີ່ຖືກຕ້ອງ: ' + text.slice(0,200)); }

  if(!payload || payload.ok !== true){
    throw new Error((payload && payload.error) || 'API error (unknown)');
  }
  return payload.data;
}

async function checkNewVjLogins(){

  try{
    const logs = await gasCall('getVjLoginLogs', State._lastLoginCheck);
    if(logs && logs.length){
      logs.forEach(l => {
        playLoginSound();
        toast('🔔 ' + l.vjName + ' (' + l.phone + ') ເຂົ້າສູ່ລະບົບ', 'info');
        State.recentLogins.unshift(l);

function playLoginSound(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.5);
  }catch(e){}
}

============================================================================ */
function ensureLightboxHost(){
  if(document.getElementById('imgLightboxHost')) return;
  const host = document.createElement('div');
  host.id = 'imgLightboxHost';
  document.body.appendChild(host);
}
function openImageLightbox(url){
  ensureLightboxHost();
  const host = document.getElementById('imgLightboxHost');
  host.innerHTML = `
    <div class="img-lightbox" id="imgLightboxOverlay">
      <button class="img-lightbox-close" onclick="closeImageLightbox()">${ICONS.close}</button>
      <img id="imgLightboxImg" src="${url}">
      <div class="img-lightbox-hint">ກົດຄ້າງ/pinch ເພື່ອຊູມ · ກົດພື້ນທີ່ວ່າງເພື່ອປິດ</div>
    </div>`;
  const overlay = document.getElementById('imgLightboxOverlay');
  const img = document.getElementById('imgLightboxImg');
  let scale = 1, panX = 0, panY = 0, isZoomed = false;
  let startDist = 0, startScale = 1;
  let dragging = false, lastX = 0, lastY = 0;

  function applyTransform(){ img.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`; }

  img.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(!isZoomed){ scale = 2.4; isZoomed = true; img.classList.add('zoomed'); }
    else { scale = 1; panX = 0; panY = 0; isZoomed = false; img.classList.remove('zoomed'); }
    applyTransform();
  });
  overlay.addEventListener('click', ()=> closeImageLightbox());

  img.addEventListener('touchstart', (e)=>{
    if(e.touches.length === 2){
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      startDist = Math.hypot(dx,dy); startScale = scale;
    } else if(e.touches.length === 1 && isZoomed){
      dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }
  }, {passive:true});
  img.addEventListener('touchmove', (e)=>{
    if(e.touches.length === 2){
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx,dy);
      scale = Math.min(4, Math.max(1, startScale * (dist/startDist)));
      isZoomed = scale > 1.05; img.classList.toggle('zoomed', isZoomed);
      applyTransform();
    } else if(e.touches.length === 1 && dragging){
      panX += e.touches[0].clientX - lastX;
      panY += e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      applyTransform();
    }
  }, {passive:true});
  img.addEventListener('touchend', ()=>{ dragging = false; });

  requestAnimationFrame(()=> overlay.classList.add('show'));
  document.body.style.overflow = 'hidden';
}
function closeImageLightbox(){
  const overlay = document.getElementById('imgLightboxOverlay');
  if(overlay){ overlay.classList.remove('show'); setTimeout(()=>{ overlay.remove(); }, 200); }
  document.body.style.overflow = '';
}

async function refreshData(showToast){
  setSync('syncing');
  try{
    const all = await gasCall('getAllData');
    if(!all || !Array.isArray(all) || !all.length){
      setSync('error');
      if(showToast) toast('API ຄືນຂໍ້ມູນວ່າງ — ກວດ permission Sheet / URL', 'error');
      State.loading = false;
      render();
      return;
    }
    State.months = all.map(d=>d.month);
    State.monthsData = {};
    all.forEach(d => {
      if(!d.label){
        var LAO_M = ['','ມັງກອນ','ກຸມພາ','ມີນາ','ເມສາ','ພຶດສະພາ','ມິຖຸນາ','ກໍລະກົດ','ສິງຫາ','ກັນຍາ','ຕຸລາ','ພະຈິກ','ທັນວາ'];
        var parts = (d.month||'').split('-');
        d.label = parts.length===2 ? LAO_M[parseInt(parts[1],10)]+' '+parts[0] : d.month;
      }
      if(d.vjList) d.vjList.forEach(vj => { vj.photoUrl = vj.photoUrl || ''; });
      State.monthsData[d.month] = d;
    });
    if(!State.activeMonth || !State.months.includes(State.activeMonth)){
      State.activeMonth = State.months.length ? State.months[State.months.length-1] : null;
    }
    setSync('idle');
    try{
      localStorage.setItem('emo_cache_months', JSON.stringify(State.months));
      localStorage.setItem('emo_cache_monthsData', JSON.stringify(State.monthsData));
    }catch(e){}
    if(showToast) toast('ອັບເດດຂໍ້ມູນສຳເລັດ', 'success');
    State.loading = false;
    render();
  }catch(err){
    console.error('refreshData error:', err);
    setSync('error');
    toast(err.message || 'Sync ບໍ່ສຳເລັດ', 'error');
    State.loading = false;
    render();
  }
}

      }
      const list = document.getElementById('vjSearchResults');
      if(list) list.innerHTML = renderVjSearchResultsInner();
    });
  }
  if(document.getElementById('poolWheelCanvas')){
    renderPoolEntryList();
    refreshPoolWheel();
  }
  if(document.getElementById('teamWheelCanvas')){
    renderTeamEntryList();
    refreshTeamWheel();
  }
  if(document.getElementById('matchupWheel')){
    refreshMatchupWheel();
  }
  const adminSearchInput = document.getElementById('vjAdminSearchInput');
  if(adminSearchInput){
    adminSearchInput.addEventListener('input', e => {
      State.searchQuery = e.target.value;
      const mobileList = document.getElementById('vjMobileList');
      if(!mobileList) return;
      const month = State.activeMonth || State.months[State.months.length-1];
      const data = State.monthsData[month];
      let list = [...(data.vjList||[])];
      const q = State.searchQuery.trim().toLowerCase();
      if(q) list = list.filter(v => String(v.bigoId).toLowerCase().includes(q));
      mobileList.innerHTML = list.length ? list.map(vj => adminVjRowHtml(month, vj)).join('') : `<div class="empty-state" style="padding:24px;"><p>ບໍ່ພົບ VJ</p></div>`;
    });
  }
  scrollActiveChipIntoView();
}

async function bootApp(){
  checkApiConfigured();
  // Step 0: ໂຫລດ cache ຄັ້ງກ່ອນ ສະແດງທັນທີ
  try{
    const cachedMonths = JSON.parse(localStorage.getItem('emo_cache_months') || 'null');
    const cachedData = JSON.parse(localStorage.getItem('emo_cache_monthsData') || 'null');
    const cachedBanners = JSON.parse(localStorage.getItem('emo_cache_banners') || 'null');
    if(cachedMonths && cachedData){
      State.months = cachedMonths;
      State.monthsData = cachedData;
      State.activeMonth = cachedMonths[cachedMonths.length-1] || null;
      State.loading = false;
      if(cachedBanners){ State.banners = cachedBanners; }
      render();
    } else {
      State.loading = true;
      render();
    }
  }catch(e){ State.loading = true; render(); }

  // Step 1: sync ຂໍ້ມູນຈິງຈາກ API
  try {
    await Promise.all([
      sessionStorage.getItem('emo_admin_pw')
        ? gasCall('adminLoginV2', State.adminName, sessionStorage.getItem('emo_admin_pw'))
            .then(res => { if(res.ok){ State.isAdmin = true; State.adminPassword = sessionStorage.getItem('emo_admin_pw'); State.adminRole = res.role; State.adminName = res.name; startLoginNotificationPolling(); } })
            .catch(()=>{})
        : Promise.resolve(),

      gasCall('getAllData').then(all => {
        if(all && Array.isArray(all) && all.length){
          State.months = all.map(d => d.month);
          State.monthsData = {};
          all.forEach(d => {
            if(!d.label) {
              var LAO_M = ['','ມັງກອນ','ກຸມພາ','ມີນາ','ເມສາ','ພຶດສະພາ','ມິຖຸນາ','ກໍລະກົດ','ສິງຫາ','ກັນຍາ','ຕຸລາ','ພະຈິກ','ທັນວາ'];
              var parts = (d.month||'').split('-');
              d.label = parts.length===2 ? LAO_M[parseInt(parts[1],10)]+' '+parts[0] : d.month;
            }
            if(d.vjList) d.vjList.forEach(vj => { vj.photoUrl = vj.photoUrl || ''; });
            State.monthsData[d.month] = d;
          });
          State.activeMonth = State.months[State.months.length - 1] || null;
          try{
            localStorage.setItem('emo_cache_months', JSON.stringify(State.months));
            localStorage.setItem('emo_cache_monthsData', JSON.stringify(State.monthsData));
          }catch(e){}
        } else {
          console.warn('getAllData empty on init');
        }
      }).catch(err=>{ console.error('getAllData failed:', err); toast(err.message,'error'); }),

      gasCall('getThemeSettings').then(t => { if(t) applyTheme(t); }).catch(()=>{}),
      gasCall('getBannersData').then(b => { if(b){ State.banners = b; startBannerAutoplay(); try{ localStorage.setItem('emo_cache_banners', JSON.stringify(b)); }catch(e){} } }).catch(()=>{}),
      gasCall('getVjPhotos').then(m => { if(m) State.vjPhotos = m; }).catch(()=>{}),
      gasCall('getSignupPhotos').then(m => { if(m) State.signupPhotos = m; }).catch(()=>{}),
      gasCall('getVjLiveData', null).then(res => {
        if (res && !res.error) {
          _vjLiveCache = res.list; State.liveMonths = res.months; State.activeLiveMonth = res.month;
        }
      }).catch(()=>{}),
      gasCall('getNewVjActiveData', null).then(res => {
        if (res && !res.error) { _newVjActiveCache = res.list; }
      }).catch(()=>{}),
    ]);
  } catch(err) {
    console.error('init error:', err);
  }

  State.loading = false;
  render();
  if(State.months.length) toast('ອັບເດດຂໍ້ມູນລ້າສຸດແລ້ວ ✓', 'info');
}

// ---- ຈຸດເລີ່ມແອັບ: ກວດ session ຂອງ VJ ກ່ອນ ----
if(State.vjSession){
  bootApp();
} else {
  document.body.classList.add('pre-login');
  State.loading = false;
  render();
  // ດຶງ Theme ຈາກ Server ມາອັບເດດ ໜ້າ Login ໃຫ້ທຸກຄົນເຫັນສີດຽວກັນ
  Promise.all([
    gasCall('getThemeSettings').catch(()=>null),
    gasCall('getBannersData').catch(()=>null)
  ]).then(([t, b]) => {
    if(t) applyTheme(t);
    if(b) State.banners = b;
    if(!State.vjSession) render(); // render ຄືນໃໝ່ດ້ວຍ Theme ຫຼ້າສຸດ
  });
}

async function submitEmoChat(){

async function sendEmoQuickQuestion(q){
  if(!State.emoChatHistory) State.emoChatHistory = [];
  State.emoChatHistory.push({role:'user', content:q});
  render();
  try{
    const historyForApi = State.emoChatHistory.slice(0,-1).slice(-10);
    const res = await gasCall('askEmoAssistant', q, historyForApi);
    State.emoChatHistory.push({role:'assistant', content: res.reply || '...', images: res.images || [], iconType: res.found ? 'found' : 'notfound'});
  }catch(err){
    State.emoChatHistory.push({role:'assistant', content: 'ຂໍໂທດ ນ້ອງ EMO ຂັດຂ້ອງ: ' + (err.message||''), iconType:'notfound'});

  render();
  const log = document.getElementById('emoChatLog');
  if(log) log.scrollTop = log.scrollHeight;
}

function saveMyBigoId(){
  const val = document.getElementById('myBigoIdInput').value.trim();

  localStorage.setItem('emo_my_bigoid', val);
  State.lookupHistory = null;

}
function clearMyBigoId(){
  State.myBigoId = ''; State.lookupHistory = null;
  localStorage.removeItem('emo_my_bigoid');
  render();
}
async function fetchMyHistory(){
  try{
    const res = await gasCall('findVjByBigoId', State.myBigoId);
    if(res && res.length > 0){ State.lookupHistory = res; }
    else {
      const target = String(State.myBigoId).trim().toLowerCase();
      const out = [];
      State.months.forEach(m => {
        (State.monthsData[m].vjList || []).forEach(vj => {
          if(String(vj.bigoId).trim().toLowerCase() === target){ out.push({ month: m, label: State.monthsData[m].label, vj }); }
        });
      });
      State.lookupHistory = out;
    }
  }catch(err){
    const target = String(State.myBigoId).trim().toLowerCase();
    const out = [];
    State.months.forEach(m => {
      (State.monthsData[m].vjList || []).forEach(vj => {
        if(String(vj.bigoId).trim().toLowerCase() === target){ out.push({ month: m, label: State.monthsData[m].label, vj }); }
      });
    });
    State.lookupHistory = out;
    if(!out.length) toast('ການຄົ້ນຫາ API ບໍ່ສຳເລັດ — ໃຊ້ຂໍ້ມູນ local', 'info');
  }
  render();
}

  if(!q) return `<div class="empty-state" style="padding:40px 20px;">${ICONS.search}<p>ພິມຊື່ ຫຼື Bigo ID ເພື່ອຄົ້ນຫາ</p></div>`;
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(async ()=>{
    try{
      const res = await gasCall('findVjByBigoId', q);
      const host = document.getElementById('vjSearchResults');
      if(!host) return;
      if(res && res.length){
        const latest = res[res.length-1];
        host.innerHTML = `
          <div class="card">
            <div class="card-row">
              <div>
                <div style="font-weight:700; font-size:16px;">${escapeHtml(q)}</div>
                <div class="text-low" style="font-size:12.5px; margin-top:2px;">${res.length} ເດືອນ · Tier ລ່າສຸດ ${tierBadgeHtml(latest.vj.ticketLevel)}</div>
              </div>
              <div class="vj-amount"><div class="usd">$${fmtMoney(res.reduce((a,h)=>a+(Number(h.vj.bonusVjUSD)||0),0))}</div><div class="beans">ສະສົມທັງໝົດ</div></div>
            </div>
          </div>
          <div class="section-label">ປະຫວັດລາຍເດືອນ</div>
          <div class="card" style="padding:8px;">
            ${res.slice().reverse().map(h => `
              <div class="vj-row">
                <div class="vj-avatar">📆</div>
                <div class="vj-info">
                  <div class="name">${escapeHtml(h.label)}</div>
                  <div class="meta">${tierBadgeHtml(h.vj.ticketLevel)} <span>${BEAN_IMG_SM} ${fmtInt(h.vj.sbeans)}</span></div>
                </div>
                <div class="vj-amount"><div class="usd">$${fmtMoney(h.vj.bonusVjUSD)}</div></div>
              </div>`).join('')}
          </div>`;
      } else {
        host.innerHTML = emptyStateHtml('inbox','ບໍ່ພົບຂໍ້ມູນ','ບໍ່ພົບ Bigo ID ນີ້ໃນຖານຂໍ້ມູນ');
      }
    }catch(e){ toast(e.message || 'ການຄົ້ນຫາບໍ່ສຳເລັດ','error'); }
  }, 350);
  return `<div class="empty-state" style="padding:30px 20px;"><div class="skeleton" style="height:18px; width:140px; margin:0 auto 8px;"></div><p class="text-low" style="font-size:12px;">ກຳລັງຄົ້ນຫາ...</p></div>`;
}

function renderVjPhoneLogin(themeOverride){
  const t = themeOverride || State.theme || {};
  const bgImg = t.loginBgImage || '';
  const overlay = t.loginBgOverlay!=null ? t.loginBgOverlay : 0.55;
  const btnColor = /^#[0-9a-fA-F]{6}$/.test(t.loginButtonColor||'') ? t.loginButtonColor : '#F5B82E';
  const btnText  = /^#[0-9a-fA-F]{6}$/.test(t.loginButtonTextColor||'') ? t.loginButtonTextColor : '#21170a';
  const btnDark  = darkenHex(btnColor, 0.25);
  const logoColor = /^#[0-9a-fA-F]{6}$/.test(t.logoColor||'') ? t.logoColor : btnColor;
  const logoHtml = t.logoUrl
    ? `<img src="${escapeHtml(t.logoUrl)}" onerror="this.parentElement.textContent='${escapeHtml(t.logoText||'E')}'">`
    : escapeHtml(t.logoText || 'E');
  return `
    <div class="vj-login-screen" ${bgImg ? `style="background-image:url('${escapeHtml(bgImg)}');"` : ''}>
      <div class="vj-login-overlay" style="opacity:${overlay};"></div>
      <div class="vj-login-inner fade-in">
        <div class="vj-login-logo" style="background:linear-gradient(145deg, ${logoColor}, ${darkenHex(logoColor,0.25)});">${logoHtml}</div>
        <h1 class="vj-login-title">ເຂົ້າສູ່ລະບົບ VJ</h1>
        <p class="vj-login-sub">ປ້ອນເບີໂທຂອງທ່ານ ເພື່ອເຂົ້າສູ່ລະບົບ ${escapeHtml(t.systemName||'EMO Agency')}</p>
        <div class="vj-login-card">
          <div class="vj-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <input id="vjPhoneInput" type="tel" placeholder="ຕົວຢ່າງ: 98386220" onkeydown="if(event.key==='Enter') submitVjPhoneLogin();">
          </div>
          <button id="vjPhoneLoginBtn" class="vj-login-btn" style="background:linear-gradient(145deg, ${btnColor}, ${btnDark}); color:${btnText};" onclick="submitVjPhoneLogin()">
            ${ICONS.check} ເຂົ້າສູ່ລະບົບ
          </button>
          <div class="vj-login-footer">© ${new Date().getFullYear()} ${escapeHtml(t.systemName||'EMO Agency')} · ${escapeHtml(t.systemSub||'Commission & Bonus VJ')}</div>
        </div>
      </div>
    </div>`;
}
async function submitVjPhoneLogin(){
  const input = document.getElementById('vjPhoneInput');
  const phone = input.value.trim();
  if(!phone){ toast('ກະລຸນາປ້ອນເບີໂທ','error'); return; }
  const btn = document.getElementById('vjPhoneLoginBtn');
  if(btn){ btn.disabled = true; btn.textContent = 'ກຳລັງກວດສອບ...'; }
  try{
    const res = await gasCall('vjLoginByPhone', phone);
    if(res && res.ok){
      State.vjSession = { vjName: res.vjName, phone: res.phone, bigoId: res.bigoId };
      document.body.classList.remove('pre-login');
      toast('ຍິນດີຕ້ອນຮັບ ' + res.vjName, 'success');
      bootApp();
    } else {
      toast((res && res.error) || 'ເບີໂທບໍ່ຖືກຕ້ອງ', 'error');
      if(btn){ btn.disabled=false; btn.textContent='ເຂົ້າສູ່ລະບົບ'; }
    }
  }catch(err){
    toast(err.message || 'ເຂົ້າສູ່ລະບົບບໍ່ສຳເລັດ','error');
    if(btn){ btn.disabled=false; btn.textContent='ເຂົ້າສູ່ລະບົບ'; }
  }
}
function vjSessionLogout(){
  localStorage.removeItem('emo_vj_session');
  location.reload();
}

      <button class="btn btn-ghost" onclick="closeModal()">ຍົກເລີກ</button>

    </div>`);
}
async function submitCreateMonth(){
  const y = document.getElementById('newMonthYear').value;
  const mm = document.getElementById('newMonthMonth').value;
  const invoice = document.getElementById('newMonthInvoice').value.trim();
  const monthKey = `${y}-${mm}`;
  if(State.months.includes(monthKey)){ toast('ເດືອນນີ້ມີຢູ່ແລ້ວ','error'); return; }
  try{
    await gasCall('adminCreateMonth', State.adminPassword, monthKey, {agency:'EMO', invoiceNo:invoice});
    toast('ສ້າງເດືອນໃໝ່ສຳເລັດ','success');
    closeModal();
    await refreshData(false);
    setView('admin-months');
  }catch(err){ toast(err.message || 'ສ້າງເດືອນບໍ່ສຳເລັດ','error'); }
}
function openEditSummaryModal(monthKey){
  const s = State.monthsData[monthKey].summary || {};
  const fields = [
    ['agency','Agency'], ['bigoId','Bigo ID (Agency)'], ['beans','Beans'], ['totalVj','Total VJ'],
    ['newVj','New VJ'], ['deductCommission','Deduct 10%? (0/1)'], ['basicSharingUSD','Basic Sharing (USD)'],
    ['vjGrowthBonusUSD','VJ Growth Bonus (USD)'], ['newVjReferralBonusUSD','New VJ Referral Bonus (USD)'],
    ['totalUSD','Total USD'], ['invoiceNo','Invoice NO.'], ['admin','Admin (ຜູ້ຮັບຜິດຊອບ)']
  ];
  openModal(`
    <div class="modal-head"><h3>ແກ້ໄຂ — ${escapeHtml(State.monthsData[monthKey].label)}</h3><button class="icon-btn" onclick="closeModal()">${ICONS.close}</button></div>
    <form id="editSummaryForm">
      ${fields.map(([key,label])=>`<div class="field"><label>${label}</label><input data-key="${key}" type="text" value="${escapeHtml(s[key]!=null?s[key]:'')}"></div>`).join('')}
    </form>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">ຍົກເລີກ</button>
      <button class="btn btn-primary btn-sm" onclick="submitEditSummary('${monthKey}')">${ICONS.check} ບັນທຶກ</button>
    </div>`);
}
async function submitEditSummary(monthKey){
  const inputs = document.querySelectorAll('#editSummaryForm [data-key]');
  const payload = {};
  inputs.forEach(inp => payload[inp.dataset.key] = inp.value);
  try{
    await gasCall('adminSaveSummary', State.adminPassword, monthKey, payload);
    toast('ບັນທຶກສຳເລັດ','success');
    closeModal();
    await refreshData(false);
    setView('admin-months');
  }catch(err){ toast(err.message || 'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}
function confirmDeleteMonth(monthKey){

  if(q) list = list.filter(v => String(v.bigoId).toLowerCase().includes(q) || String(v.vjName).toLowerCase().includes(q) || String(v.phone).includes(q));
  if(!list.length) return `<div class="empty-state" style="padding:24px;"><p>ບໍ່ພົບຂໍ້ມູນ</p></div>`;
  const now = Date.now();
  return list.map(v => {
    const lastLoginMs = v.lastLogin ? new Date(v.lastLogin).getTime() : 0;
    const isOnline = lastLoginMs && (now - lastLoginMs) < 5*60*1000; // ອອນລາຍ = ເຂົ້າພາຍໃນ 5 ນາທີລ່າສຸດ
    const lastLoginLabel = lastLoginMs ? new Date(v.lastLogin).toLocaleString('lo-LA') : 'ຍັງບໍ່ເຄີຍເຂົ້າ';
    return `
    <div class="vj-row">
      <div class="vj-avatar">${initials(v.bigoId||v.vjName)}</div>
      <div class="vj-info">
        <div class="name">${escapeHtml(v.vjName)} <span class="text-low mono" style="font-size:11px;">${escapeHtml(v.bigoId||'')}</span></div>
        <div class="meta">📱 ${escapeHtml(v.phone)} · <span class="online-badge ${isOnline?'on':'off'}">${isOnline?'🟢 ອອນລາຍ':'⚪ '+escapeHtml(lastLoginLabel)}</span></div>
      </div>
      <div style="display:flex; gap:4px;">
        <button class="icon-btn" onclick='openVjPhoneFormModal(${JSON.stringify(v).replace(/'/g,"&#39;")})'>${ICONS.edit}</button>
        <button class="icon-btn" style="color:var(--coral);" onclick="confirmDeleteVjPhone(${v.rowIndex}, '${escapeHtml(v.vjName)}')">${ICONS.trash}</button>
      </div>
    </div>`;
  }).join('');
}

  const inputs = document.querySelectorAll('#bannerForm [data-key]');

  inputs.forEach(inp => payload[inp.dataset.key] = inp.value);

  State.banners.tickerText = document.getElementById('tickerText').value;

}

function previewLogoUrl(url) {
  const wrap = document.getElementById('logoPreviewWrap');
  const img  = document.getElementById('logoPreviewImg');
  if(!wrap || !img) return;
  if(url) {
    img.src = url; img.style.display = 'block'; wrap.style.display = 'block';
    document.querySelectorAll('.brand-mark, .login-mark').forEach(el => { el.innerHTML = `<img src="${escapeHtml(url)}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;">`; });
  } else { wrap.style.display = 'none'; }
}
function previewHeroBg(url){ document.documentElement.style.setProperty('--hero-bg-image', url ? `url('${url}')` : 'none'); }
function clearHeroBg(){ document.getElementById('heroBgImage').value = ''; previewHeroBg(''); toast('ລຶບຮູບພື້ນຫຼັງແລ້ວ (ຍັງບໍ່ໄດ້ບັນທຶກ)','info'); }
function liveColorPreview(key, val) {
  const cssMap = { ink:'--ink', ink2:'--ink-2', ink3:'--ink-3', line:'--line', gold:'--gold', mint:'--mint', coral:'--coral', ice:'--ice', rank1:'--rank1', rank2:'--rank2', rank3:'--rank3', tierCHi:'--tier-c-hi', tierSHi:'--tier-s-hi', textHi:'--text-hi', textMid:'--text-mid', textLow:'--text-low', heroBg1:'--hero-bg1', heroBg2:'--hero-bg2', heroGlow:'--hero-glow', rankOtherBg:'--rank-other-bg', rankOtherBorder:'--rank-other-border' };
  if(cssMap[key]) document.documentElement.style.setProperty(cssMap[key], val);
}
function previewFont(type, val){
  const fontMap = { 'Inter':"'Inter','Noto Sans Lao',sans-serif", 'Poppins':"'Poppins','Noto Sans Lao',sans-serif", 'Kanit':"'Kanit','Noto Sans Lao',sans-serif", 'Prompt':"'Prompt','Noto Sans Lao',sans-serif", 'Sora':"'Sora','Noto Sans Lao',sans-serif", 'Space Grotesk':"'Space Grotesk','Noto Sans Lao',sans-serif", 'Manrope':"'Manrope','Noto Sans Lao',sans-serif" };
  if(type==='body'    && fontMap[val]) document.documentElement.style.setProperty('--f-body',    fontMap[val]);
  if(type==='display' && fontMap[val]) document.documentElement.style.setProperty('--f-display', fontMap[val]);
}
async function saveThemeAll(){
  const newT = Object.assign({}, State.theme);
  document.querySelectorAll('.color-picker[data-key]').forEach(el => { if(/^#[0-9a-fA-F]{6}$/.test(el.value)) newT[el.dataset.key] = el.value; });
  const fb = document.getElementById('fontBody');    if(fb) newT.fontBody = fb.value;
  const fd = document.getElementById('fontDisplay'); if(fd) newT.fontDisplay = fd.value;
  const br = document.getElementById('borderRadius'); if(br) newT.borderRadius = br.value;
  const lt = document.getElementById('logoText');    if(lt) newT.logoText = lt.value;
  const lc = document.getElementById('logoColor');   if(lc) newT.logoColor = lc.value;
  const sn = document.getElementById('systemName');  if(sn) newT.systemName = sn.value;
  const ss2 = document.getElementById('systemSub');  if(ss2) newT.systemSub = ss2.value;
  const lu = document.getElementById('logoUrl');     if(lu) newT.logoUrl = lu.value;
  const hbg = document.getElementById('heroBgImage');        if(hbg) newT.heroBgImage = hbg.value;
  const hov = document.getElementById('heroOverlayOpacity');  if(hov) newT.heroOverlayOpacity = parseFloat(hov.value);
  const lbi = document.getElementById('loginBgImage');        if(lbi) newT.loginBgImage = lbi.value;
  const lbo = document.getElementById('loginBgOverlay');       if(lbo) newT.loginBgOverlay = parseFloat(lbo.value);
  const lbc = document.getElementById('loginButtonColor');     if(lbc) newT.loginButtonColor = lbc.value;
  const lbt = document.getElementById('loginButtonTextColor'); if(lbt) newT.loginButtonTextColor = lbt.value;
  const ltc = document.getElementById('loginTitleColor'); if(ltc) newT.loginTitleColor = ltc.value;
  const lsc = document.getElementById('loginSubColor');   if(lsc) newT.loginSubColor = lsc.value;
  const navIcons = {};
  document.querySelectorAll('.nav-icon-input').forEach(inp=>{ if(inp.value.trim()) navIcons[inp.dataset.navid] = inp.value.trim(); });
  newT.navIcons = navIcons;
  applyTheme(newT);
  if(newT.logoUrl){ document.querySelectorAll('.brand-mark,.login-mark').forEach(el=>{ el.innerHTML=`<img src="${newT.logoUrl}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;" onerror="this.parentElement.textContent='${newT.logoText||'E'}'">`; }); }
  try{
    await gasCall('saveThemeSettings', State.adminPassword, newT);
    toast('ບັນທຶກ Theme ສຳເລັດ ✓ (ທຸກເຄື່ອງ)','success');
  }catch(e){
    console.error('saveThemeSettings error:', e);
    toast('⚠️ ບັນທຶກຂຶ້ນ Server ບໍ່ສຳເລັດ! (' + (e && e.message ? e.message : 'unknown error') + ')', 'error');
  }
}
async function resetTheme(){
  const def = {ink:'#0B1220',ink2:'#101A2E',ink3:'#16223B',line:'#233153',gold:'#F5B82E',mint:'#2DD4A8',coral:'#FF6B5E',ice:'#6FB7FF',textHi:'#F4F2ED',textMid:'#B8C0D6',textLow:'#71799A',btnText:'#21170a',fontBody:'Inter',fontDisplay:'Sora',borderRadius:'16',logoText:'E',logoColor:'#F5B82E',systemName:'EMO Agency',systemSub:'Commission & Bonus VJ',logoUrl:''};
  applyTheme(def);
  localStorage.removeItem('emo_theme');
  try{ await gasCall('resetThemeSettings', State.adminPassword); }catch(e){}
  toast('Reset Theme ແລ້ວ','success');
  setView('admin-settings');
}

    ocean:  {ink:'#061220',ink2:'#0A1F35',ink3:'#102946',line:'#1B4F72',gold:'#38BDF8',mint:'#34D399',coral:'#FB923C',ice:'#60A5FA',textHi:'#F0F9FF',textMid:'#BAE6FD',textLow:'#7DD3FC',btnText:'#0C1A2B'},
    forest: {ink:'#0A1208',ink2:'#0F1C0D',ink3:'#162614',line:'#2D4A28',gold:'#86EFAC',mint:'#6EE7B7',coral:'#FCA5A5',ice:'#A7F3D0',textHi:'#F0FDF4',textMid:'#BBF7D0',textLow:'#4ADE80',btnText:'#0A1208'},
    rose:   {ink:'#1A0A10',ink2:'#25101A',ink3:'#321524',line:'#5A2840',gold:'#F472B6',mint:'#FB7185',coral:'#FBBF24',ice:'#F9A8D4',textHi:'#FDF2F8',textMid:'#FBCFE8',textLow:'#F9A8D4',btnText:'#1A0A10'},

    gold24: {ink:'#0C0A05',ink2:'#171208',ink3:'#231B0D',line:'#4A3C1E',gold:'#FFD65C',mint:'#B8E994',coral:'#FF8A65',ice:'#FFC978',textHi:'#FFF8E1',textMid:'#E8D5A3',textLow:'#A8925C',btnText:'#1A1204'},
    chrome: {ink:'#0A0E14',ink2:'#101620',ink3:'#182230',line:'#2A3A4E',gold:'#5EEAD4',mint:'#7DD3FC',coral:'#FCA5A5',ice:'#A5F3FC',textHi:'#F0FDFA',textMid:'#99F6E4',textLow:'#5EEAD4',btnText:'#062018'},

let _vjLiveCache = null;
let _vjLiveCacheByMonth = {};   // ★ ໃໝ່: cache ແຍກຕາມແຕ່ລະເດືອນ
let _vjLiveLoading = false;
let _vjLiveAutoRefreshTimer = null;

async function fetchVjLiveData(monthKey, forceRefresh) {
  if (_vjLiveLoading) return;
  const cacheKey = monthKey || State.activeLiveMonth || '__latest__';

  // ★ ຖ້າມີ cache ຂອງເດືອນນີ້ຢູ່ແລ້ວ ແລະ ບໍ່ໄດ້ບັງຄັບ refresh → ໃຊ້ທັນທີ ບໍ່ຕ້ອງລໍ backend
  if (!forceRefresh && _vjLiveCacheByMonth[cacheKey]) {
    _vjLiveCache = _vjLiveCacheByMonth[cacheKey].list;
    if (_vjLiveCacheByMonth[cacheKey].months) State.liveMonths = _vjLiveCacheByMonth[cacheKey].months;
    State.activeLiveMonth = _vjLiveCacheByMonth[cacheKey].month || monthKey;
    if (State.view === 'livedata') { document.getElementById('main').innerHTML = renderVjLiveData(); afterRenderHook(); }
    return;
  }

  if (!_vjLiveCache) {
    try { _vjLiveCache = JSON.parse(localStorage.getItem('emo_cache_vjlive') || 'null'); } catch(e){}
  }
  _vjLiveLoading = true;
  try {
    const res = await gasCall('getVjLiveData', monthKey || State.activeLiveMonth || null);
    if (res && !res.error) {
      _vjLiveCache = Array.isArray(res.list) ? res.list : [];
      _vjLiveCacheByMonth[cacheKey] = { list: _vjLiveCache, months: res.months, month: res.month }; // ★ ເກັບ cache
      try{ localStorage.setItem('emo_cache_vjlive', JSON.stringify(_vjLiveCache)); }catch(e){}
      if (Array.isArray(res.months) && res.months.length) State.liveMonths = res.months;
      State.activeLiveMonth = res.month || State.activeLiveMonth;
    } else {
      _vjLiveCache = null;
      toast((res && res.error) || 'ໂຫລດ Live Data ບໍ່ສຳເລັດ', 'error');
    }
  } catch(e) {
    _vjLiveCache = null;
    toast(e.message || 'ໂຫລດ Live Data ບໍ່ສຳເລັດ', 'error');
  }
  _vjLiveLoading = false;
  if (State.view === 'livedata') { document.getElementById('main').innerHTML = renderVjLiveData(); afterRenderHook(); }
}

function switchLiveMonth(key){
  State.activeLiveMonth = key;
  render();              // ★ ໃຫ້ chip ປ່ຽນ active ທັນທີ + ສະແດງ cache/skeleton ທັນທີ
  fetchVjLiveData(key);  // ຄ່ອຍ sync ຫຼັງບ້ານ (ໃຊ້ cache ຖ້າມີ, ຫຼືດຶງໃໝ່ຖ້າຍັງບໍ່ມີ)
}
function startVjLiveAutoRefresh(){
  stopVjLiveAutoRefresh();
  _vjLiveAutoRefreshTimer = setInterval(()=>{
    if(State.view === 'livedata' && !_vjLiveLoading){ fetchVjLiveData(State.activeLiveMonth); }
    else if(State.view !== 'livedata'){ stopVjLiveAutoRefresh(); }
  }, 60000);
}
function stopVjLiveAutoRefresh(){ if(_vjLiveAutoRefreshTimer){ clearInterval(_vjLiveAutoRefreshTimer); _vjLiveAutoRefreshTimer = null; } }
function renderVjLiveData() {
  startVjLiveAutoRefresh();
  if (!_vjLiveCache && !_vjLiveLoading) { fetchVjLiveData(); return skeletonHtml(); }
  if (_vjLiveLoading && !_vjLiveCache) return skeletonHtml();
  const list = _vjLiveCache || [];
  if (State.isAdmin) {
    const q = (State.searchQuery || '').trim().toLowerCase();

      </div>
      ${State.liveMonths && State.liveMonths.length ? `<div class="chip-row">${State.liveMonths.map(m => `<button class="chip ${m.key===State.activeLiveMonth?'active':''}" onclick="switchLiveMonth('${m.key}')">${escapeHtml(m.label)}</button>`).join('')}</div>` : ''}

        <div class="stat-card"><div class="l">VJ ທັງໝົດ</div><div class="v">${list.length}</div></div>
        <div class="stat-card"><div class="l">VJ Active ເດືອນນີ້</div><div class="v mint">${activeVj}</div></div>
        <div class="stat-card"><div class="l">Beans ລວມເດືອນນີ້</div><div class="v gold">${fmtInt(totalBeans)}</div></div>
        <div class="stat-card"><div class="l">VJ ໃໝ່ (< 3 ເດືອນ)</div><div class="v">${list.filter(v => v.isNewVj).length}</div></div>
      </div>
      <div class="search-bar" style="margin-bottom:10px;">
        ${ICONS.search}
        <input id="vjSearchInput" type="text" placeholder="ຄົ້ນຫາ BIGO ID ຫຼື ຊື່ VJ..." value="${escapeHtml(State.searchQuery)}">
        <button class="btn btn-ghost btn-sm" onclick="fetchVjLiveData(State.activeLiveMonth, true); toast('ກຳລັງ Refresh...','info');" style="flex-shrink:0; padding:6px 10px;">🔄</button>
      </div>
      <div id="vjLiveList">${filtered.length ? filtered.map(vj => vjLiveCardHtml(vj)).join('') : `<div class="empty-state"><p>ບໍ່ພົບ VJ</p></div>`}</div>`;
  }
  const myId = State.myBigoId || '';
  const liveSearchId = State._liveSearchId || '';
  if (!liveSearchId) {
    return `
      <div class="page-head fade-in">
        <p class="eyebrow">Live Data</p>
        <h1>📊 ໄລ້ດາຕ້າ VJ</h1>
        <p>ປ້ອນ Bigo ID ຂອງທ່ານ ເພື່ອກວດສອບຂໍ້ມູນ Live ແລະ ໂບນັດ</p>
      </div>
      <div class="card" style="margin-top:8px;">
        <div class="field"><label>Bigo ID ຂອງທ່ານ</label><input id="liveSearchInput" type="text" placeholder="ຕົວຢ່າງ: Dao_220" value="${escapeHtml(myId)}" onkeydown="if(event.key==='Enter') submitLiveSearch();"></div>
        <button class="btn btn-primary btn-block" onclick="submitLiveSearch()">${ICONS.search} ກວດສອບຂໍ້ມູນ Live ຂອງຂ້ອຍ</button>
      </div>
      <div class="card" style="margin-top:14px; background:rgba(111,183,255,0.06); border-color:rgba(111,183,255,0.25);">
        <p style="font-size:13px; color:var(--text-mid); margin:0; line-height:1.7;">💡 ໃສ່ Bigo ID ຂອງທ່ານ ເພື່ອເບິ່ງ:<br>• ຖົ່ວທີ່ໄດ້ໃນເດືອນນີ້<br>• ຊົ່ວໂມງ Lives ທີ່ສะສົມ<br>• Grade ແລະ ໂບນັດ ທີ່ຈະໄດ້ຮັບ<br>• ຈຳນວນຖົ່ວ ທີ່ຍັງຂາດ</p>
      </div>`;
  }
  const found = list.find(v => String(v.bigoId).trim().toLowerCase() === liveSearchId.toLowerCase());
  return `
    <div class="page-head fade-in"><p class="eyebrow">Live Data</p><h1>📊 ໄລ້ດາຕ້າ VJ</h1></div>
    ${State.liveMonths && State.liveMonths.length ? `<div class="chip-row">${State.liveMonths.map(m => `<button class="chip ${m.key===State.activeLiveMonth?'active':''}" onclick="switchLiveMonth('${m.key}')">${escapeHtml(m.label)}</button>`).join('')}</div>` : ''}
    <div style="display:flex; gap:8px; margin-bottom:14px; align-items:center;">
      <div class="search-bar" style="flex:1; margin-bottom:0;">${ICONS.search}<input id="liveSearchInput" type="text" placeholder="Bigo ID..." value="${escapeHtml(liveSearchId)}" onkeydown="if(event.key==='Enter') submitLiveSearch();"></div>
      <button class="btn btn-primary btn-sm" onclick="submitLiveSearch()">ຄົ້ນຫາ</button>
      <button class="btn btn-ghost btn-sm" onclick="_vjLiveCache=null; State._liveSearchId=liveSearchId; fetchVjLiveData(State.activeLiveMonth);">🔄</button>
    </div>
    ${found ? vjLiveCardHtml(found) : `<div class="card" style="text-align:center; padding:40px 20px;"><div style="font-size:36px; margin-bottom:12px;">🔍</div><h3 style="margin:0 0 8px; color:var(--text-mid);">ບໍ່ພົບ Bigo ID ນີ້</h3><p style="color:var(--text-low); font-size:13px; margin:0;">ກວດສອບການສະກົດ ID ອີກຄັ້ງ ຫຼື ຕິດຕໍ່ Admin</p></div>`}
    <button class="btn btn-ghost btn-block" style="margin-top:14px;" onclick="State._liveSearchId=''; render();">← ກັບໄປໜ້າຄົ້ນຫາ</button>`;
}
function submitLiveSearch() {
  const input = document.getElementById('liveSearchInput');
  if (!input || !input.value.trim()) { toast('ກະລຸນາປ້ອນ Bigo ID', 'error'); return; }
  State._liveSearchId = input.value.trim();
  if (_vjLiveCache) { render(); return; }
  fetchVjLiveData(); render();
}
function findPhotoUrlByBigoId(bigoId) {
  if (!bigoId) return '';
  const key = String(bigoId).trim().toLowerCase();
  if (State.vjPhotos && State.vjPhotos[key]) return State.vjPhotos[key];
  if (_vjLiveCache) {
    const found = _vjLiveCache.find(v => String(v.bigoId).trim().toLowerCase() === key);
    if (found && found.photoUrl) return found.photoUrl;
  }
  if (State.signupPhotos && State.signupPhotos[key]) return State.signupPhotos[key];
  for (const m of State.months) {
    const list = (State.monthsData[m] && State.monthsData[m].vjList) || [];
    for (const v of list) { if (String(v.bigoId).trim().toLowerCase() === key && v.photoUrl) return v.photoUrl; }
  }
  return '';
}
function vjLiveCardHtml(vj) {

  const hoursPct = Math.min(100, Math.round(vj.hoursMonth / vj.reqHours * 100));

  const hoursColor = vj.hoursReqMet ? 'var(--mint)' : 'var(--coral)';

  return `
    <div class="card" style="margin-bottom:10px; padding:14px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">

let _newVjActiveLoading = false;

async function fetchNewVjActiveData(monthKey, forceRefresh){
  if(_newVjActiveLoading) return;
  const cacheKey = monthKey || State.activeLiveMonth || '__latest__';

  // ★ ຖ້າມີ cache ຂອງເດືອນນີ້ຢູ່ແລ້ວ ແລະ ບໍ່ໄດ້ບັງຄັບ refresh → ໃຊ້ທັນທີ
  if(!forceRefresh && _newVjActiveCacheByMonth[cacheKey]){
    _newVjActiveCache = _newVjActiveCacheByMonth[cacheKey].list;
    if(_newVjActiveCacheByMonth[cacheKey].months) State.liveMonths = _newVjActiveCacheByMonth[cacheKey].months;
    State.activeLiveMonth = _newVjActiveCacheByMonth[cacheKey].month || monthKey;
    if(State.view === 'newvjactive'){ document.getElementById('main').innerHTML = renderNewVjActive(); afterRenderHook(); }
    return;
  }

  if(!_newVjActiveCache){
    try{ _newVjActiveCache = JSON.parse(localStorage.getItem('emo_cache_newvjactive') || 'null'); }catch(e){}
    if(_newVjActiveCache && State.view === 'newvjactive'){
      document.getElementById('main').innerHTML = renderNewVjActive();
      afterRenderHook();
    }
  }
  _newVjActiveLoading = true;
  try{
    const res = await gasCall('getNewVjActiveData', monthKey || State.activeLiveMonth || null);
    if(res && !res.error){
      _newVjActiveCache = Array.isArray(res.list) ? res.list : [];
      _newVjActiveCacheByMonth[cacheKey] = { list: _newVjActiveCache, months: res.months, month: res.month }; // ★ ເກັບ cache
      try{ localStorage.setItem('emo_cache_newvjactive', JSON.stringify(_newVjActiveCache)); }catch(e){}
      if(Array.isArray(res.months) && res.months.length) State.liveMonths = res.months;
      State.activeLiveMonth = res.month || State.activeLiveMonth;
    } else if(!_newVjActiveCache){ toast((res&&res.error)||'ໂຫລດຂໍ້ມູນບໍ່ສຳເລັດ','error'); }
  }catch(e){ if(!_newVjActiveCache){ toast(e.message || 'ໂຫລດຂໍ້ມູນບໍ່ສຳເລັດ','error'); } }
  _newVjActiveLoading = false;
  if(State.view === 'newvjactive'){ document.getElementById('main').innerHTML = renderNewVjActive(); afterRenderHook(); }
}

function switchNewVjActiveMonth(key){
  State.activeLiveMonth = key;
  render();                      // ★ chip ປ່ຽນ active ທັນທີ + ໂຊວ໌ cache/skeleton ທັນທີ

function renderNewVjActiveListInner(){
  const list = _newVjActiveCache || [];
  const q = (State.searchQuery||'').trim().toLowerCase();
  const filtered = q ? list.filter(v => String(v.bigoId).toLowerCase().includes(q) || (v.vjName||'').toLowerCase().includes(q)) : list;
  if(!filtered.length) return `<div class="empty-state"><p>ບໍ່ພົບ VJ ໃໝ່</p></div>`;

  const sorted = filtered.slice().sort((a,b)=>{
    // 1) ຜ່ານເກນ (met=true) ຂຶ້ນກ່ອນສະເໝີ
    if(a.met !== b.met) return a.met ? -1 : 1;
    // 2) ຖ້າຜ່ານທັງຄູ່ ຫຼື ບໍ່ຜ່ານທັງຄູ່ → ຮຽງຕາມຖົ່ວ ຫຼາຍ→ໜ້ອຍ
    const beansDiff = (b.beansMonth||0) - (a.beansMonth||0);

    // 3) ຖ້າຖົ່ວເທົ່າກັນ → ຮຽງຕາມຊົ່ວໂມງ ຫຼາຍ→ໜ້ອຍ
    return (b.hoursMonth||0) - (a.hoursMonth||0);

  return sorted.map(vj => `

        <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14.5px;">${escapeHtml(vj.vjName||vj.bigoId)}</div><div style="font-size:11.5px;color:var(--text-low);">${escapeHtml(vj.bigoId)} ·📆 ເດືອນທີ ${vj.supportMonthIndex} ຂອງການສະໜັບສະໜູນ</div></div>
        <span style="background:${vj.met?'rgba(45,212,168,0.15)':'rgba(255,107,94,0.12)'};color:${vj.met?'var(--mint)':'var(--coral)'};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">${vj.met?'✅ ຜ່ານ':'⚠️ ຍັງບໍ່ຜ່ານ'}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:20px;font-weight:800;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:4px;">${BEAN_IMG_SM}${fmtInt(vj.beansMonth)}</div><div style="font-size:10px;color:var(--text-low);">ຖົ່ວປັດຈຸບັນ</div></div>
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:20px;font-weight:800;">${(vj.hoursMonth||0).toFixed(1)}h</div><div style="font-size:10px;color:var(--text-low);"> 🕐 ຊົ່ວໂມງ</div></div>

let _pkCache = null;

async function fetchPkData(monthKey){
  if(_pkLoading) return;
  if(!_pkCache){
    try{
      const cached = JSON.parse(localStorage.getItem('emo_cache_pk') || 'null');
      if(cached){ _pkCache = cached.list; State.pkPhotos = cached.photos || {covers:{},matches:{}}; }
    }catch(e){}
    if(_pkCache && (State.view==='pk' || State.view==='admin-pk')){
      document.getElementById('main').innerHTML = (State.view==='pk'?renderPk():renderAdminPk());
      afterRenderHook();
    }
  }
  _pkLoading = true;
  try{
    const [res, photos] = await Promise.all([
      gasCall('getPkData', monthKey || State.activePkMonth || null),
      gasCall('getPkPhotos').catch(()=>({covers:{},matches:{}}))
    ]);
    if(res && !res.error){
      _pkCache = res.list || [];
      State.pkMonths = res.months || [];
      State.activePkMonth = res.month || State.activePkMonth;
      State.pkPhotos = photos;
      try{ localStorage.setItem('emo_cache_pk', JSON.stringify({list:_pkCache, photos:photos})); }catch(e){}
    } else if(!_pkCache){ _pkCache = []; toast((res&&res.error)||'ໂຫລດຂໍ້ມູນ PK ບໍ່ສຳເລັດ','error'); }
  }catch(e){ if(!_pkCache){ _pkCache = []; toast(e.message||'ໂຫລດຂໍ້ມູນ PK ບໍ່ສຳເລັດ','error'); } }
  _pkLoading = false;
  if(State.view==='pk' || State.view==='admin-pk'){ document.getElementById('main').innerHTML = (State.view==='pk'?renderPk():renderAdminPk()); afterRenderHook(); }
}

function createSpinWheel(canvasId, items, onFinish){
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const cx = canvas.width/2, cy = canvas.height/2;
  const outerRadius = cx - 4;
  const borderWidth = 14;
  const radius = outerRadius - borderWidth;
  const COLORS = ['#F5B82E','#2DD4A8','#FF6B5E','#6FB7FF','#C084FC','#FBBF24'];
  let rot = 0;
  function draw(){
    const n = items.length; const arc = (2*Math.PI)/n;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ຂອບສີຄີມ + ຈຸດຮອບຂອບ
    ctx.beginPath(); ctx.arc(cx,cy,outerRadius,0,2*Math.PI);
    ctx.fillStyle = '#FDF6E3'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#E8C574'; ctx.stroke();
    const dotCount = 20;
    for(let d=0; d<dotCount; d++){
      const da = (2*Math.PI/dotCount)*d;
      const dx = cx + Math.cos(da)*(outerRadius-7);
      const dy = cy + Math.sin(da)*(outerRadius-7);
      ctx.beginPath(); ctx.arc(dx,dy,3,0,2*Math.PI);
      ctx.fillStyle = '#F3D9A4'; ctx.fill();
    }

    items.forEach((label,i)=>{
      const a = rot + i*arc;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,radius,a,a+arc); ctx.closePath();
      ctx.fillStyle = COLORS[i%COLORS.length]; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(a+arc/2);
      ctx.fillStyle = '#1a1206';           // ← ໂຕໜັງສືສີດຳ
      ctx.font = 'bold 12px Inter'; ctx.textAlign = 'right';
      ctx.fillText(String(label).slice(0,12), radius-10, 4);
      ctx.restore();
    });

    ctx.beginPath(); ctx.arc(cx,cy,radius*0.16,0,2*Math.PI);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = '#E8C574'; ctx.lineWidth = 3; ctx.stroke();
  }
  draw();
  function spin(){
    const n = items.length; const arc=(2*Math.PI)/n;
    const winnerIdx = Math.floor(Math.random()*n);
    const target = (-Math.PI/2) - winnerIdx*arc - arc/2;
    const start = rot, extra = 6*2*Math.PI;
    const finish = start + extra + ((target - start) % (2*Math.PI) + 2*Math.PI)%(2*Math.PI);
    const t0 = performance.now(), dur=4200;
    function ease(t){ return 1-Math.pow(1-t,3); }
    function frame(now){
      const t = Math.min(1,(now-t0)/dur);
      rot = start + (finish-start)*ease(t);
      draw();
      if(t<1) requestAnimationFrame(frame);
      else onFinish(items[winnerIdx], winnerIdx);
    }
    requestAnimationFrame(frame);
  }
  return { spin };
}

let _pkFamilyBannerAutoplayTimer = null;
function startPkFamilyBannerAutoplay(){
  clearInterval(_pkFamilyBannerAutoplayTimer);
  const list = State.pkFamilyBanners.banners || [];
  if(list.length <= 1) return;
  _pkFamilyBannerAutoplayTimer = setInterval(()=>{
    State.pkFamilyBannerSlideIdx = (State.pkFamilyBannerSlideIdx + 1) % list.length;
    updatePkFamilyBannerSlideUI();
  }, 7000);
}
function goToPkFamilyBannerSlide(i){
  const list = State.pkFamilyBanners.banners || [];
  if(!list.length) return;
  State.pkFamilyBannerSlideIdx = ((i % list.length) + list.length) % list.length;
  updatePkFamilyBannerSlideUI();
  startPkFamilyBannerAutoplay();
}
function updatePkFamilyBannerSlideUI(){
  document.querySelectorAll('.pkfamily-slide').forEach((el,i)=>{ el.classList.toggle('active', i === State.pkFamilyBannerSlideIdx); });
  document.querySelectorAll('.pkfamily-dot').forEach((el,i)=>{ el.classList.toggle('active', i === State.pkFamilyBannerSlideIdx); });
}
function pkFamilyBannerSliderHtml(){
  const list = (State.pkFamilyBanners.banners || []).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  if(!list.length) return '';
  if(State.pkFamilyBannerSlideIdx >= list.length) State.pkFamilyBannerSlideIdx = 0;
  return `
    <div class="banner-slider pkfamily-slider-wrap">
      ${list.map((b,i)=>`
        <div class="banner-slide pkfamily-slide ${i===State.pkFamilyBannerSlideIdx?'active':''}">
          <img src="${escapeHtml(b.imageUrl)}" onclick="${b.link?`window.open('${escapeHtml(b.link)}','_blank')`:''}" onerror="this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:13px;\'>⚠️ ໂຫລດຮູບບໍ່ໄດ້</div>'">
        </div>`).join('')}
      ${list.length>1?`
        <button class="banner-arrow prev" onclick="goToPkFamilyBannerSlide(${State.pkFamilyBannerSlideIdx-1})">${ICONS.chevron.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" style="transform:scaleX(-1)"')}</button>
        <button class="banner-arrow next" onclick="goToPkFamilyBannerSlide(${State.pkFamilyBannerSlideIdx+1})">${ICONS.chevron}</button>
        <div class="banner-dots">
          ${list.map((b,i)=>`<button class="banner-dot pkfamily-dot ${i===State.pkFamilyBannerSlideIdx?'active':''}" onclick="goToPkFamilyBannerSlide(${i})"></button>`).join('')}
        </div>`:''}
    </div>`;
}

function roundLabel(idx, totalRounds){
  const left = totalRounds - idx;
  if(left === 1) return '🏆 ຮອບຊິງຊະນະເລີດ';
  if(left === 2) return '🥈 ຮອບຮອງຊະນະເລີດ';
  return `ຮອບທີ ${idx+1}`;
}

function stripAgencyPrefix(name){
  return String(name||'').replace(/^E\s*M\s*O\s*/i, '').trim();
}
function pkFamilyTeamCardHtml(team, resultBadge){
  if(!team) return `<div style="flex:1; min-width:0; text-align:center; color:var(--text-low); font-size:12px; padding-top:20px;">ລໍຖ້າຄູ່ແຂ່ງ...</div>`;
  const members = team.members || [];
  return `
    <div style="text-align:center; flex:1; min-width:0; overflow:hidden;">
      <div style="position:relative; display:flex; justify-content:center; padding-top:6px;">
        <div style="display:flex; justify-content:center; gap:6px;">
          ${members.map((m,i)=>`<img src="${escapeHtml(findPhotoUrlByBigoId(m.bigoId) || m.photoUrl || '')}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);background:var(--ink-3);flex-shrink:0;" onerror="this.src='https://via.placeholder.com/60?text=${encodeURIComponent(initials(m.bigoId))}'">`).join('')}
        </div>

      </div>
      <div style="font-weight:800; font-size:12.5px; color:var(--gold); margin-top:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(team.name)}</div>
      <div style="font-size:9.5px; color:var(--text-low); line-height:1.4; padding:0 2px;">${members.map(m=>escapeHtml(stripAgencyPrefix(m.vjName||m.bigoId))).join(', ')}</div>

function renderPkFamily(){
  if(!_pkFamilyCache){ fetchPkFamilyData(); return skeletonHtml(); }
  const data = _pkFamilyCache;

  const teamsById = {}; (data.teams||[]).forEach(t=>teamsById[t.id]=t);

  return `
    <div class="page-head fade-in">
      <p class="eyebrow">ກິດຈະກຳ</p>
      <h1><img src="https://i.postimg.cc/V67nf2bN/icon-Tofy.png" style="width:36px;height:36px;object-fit:contain;vertical-align:-7px;margin-right:6px;">PK Family 3v3</h1>

            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
              <span class="mono" style="font-size:12px; color:var(--text-low);">🕐 ${escapeHtml(m.time||'-')}</span>

              <div style="flex-shrink:0; width:36px; display:flex; flex-direction:column; align-items:center; padding-top:6px;">
                <img src="https://i.postimg.cc/cJtHMpjn/icon-PK.png" style="width:32px;height:32px;object-fit:contain;">

            </div>` : ''}

async function setPkFamilyScore(roundIndex, matchId, scoreA, scoreB){
  const m = (_pkFamilyCache.rounds[roundIndex]||[]).find(x=>x.matchId===matchId) || {};
  const finalA = scoreA!==null ? scoreA : (m.scoreA||0);
  const finalB = scoreB!==null ? scoreB : (m.scoreB||0);
  try{
    await gasCall('adminSetPkFamilyScore', State.adminPassword, roundIndex, matchId, finalA, finalB);
    toast('ບັນທຶກຄະແນນສຳເລັດ','success');
    fetchPkFamilyData();
  }catch(e){ toast(e.message||'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}

async function submitPkFamilyBannerForm(existingId){
  const inputs = document.querySelectorAll('#pkFamilyBannerForm [data-key]');
  const payload = {};
  inputs.forEach(inp => payload[inp.dataset.key] = inp.value);
  if(!payload.imageUrl){ toast('ກະລຸນາປ້ອນລິ້ງຮູບ','error'); return; }
  payload.order = Number(payload.order)||0;
  payload.id = existingId || ('pkb_' + Date.now());
  const list = (State.pkFamilyBanners.banners || []).slice();
  const idx = list.findIndex(b=>b.id===payload.id);
  if(idx>-1) list[idx] = payload; else list.push(payload);
  State.pkFamilyBanners.banners = list;
  try{
    await gasCall('savePkFamilyBannersData', State.adminPassword, State.pkFamilyBanners);
    toast('ບັນທຶກແບນເນີ້ສຳເລັດ','success');
    closeModal();
    setView('admin-pkfamily');
  }catch(err){ toast(err.message || 'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}
async function deletePkFamilyBanner(id){
  State.pkFamilyBanners.banners = (State.pkFamilyBanners.banners||[]).filter(b=>b.id!==id);
  try{
    await gasCall('savePkFamilyBannersData', State.adminPassword, State.pkFamilyBanners);
    toast('ລຶບແບນເນີ້ສຳເລັດ','success');
    setView('admin-pkfamily');
  }catch(err){ toast(err.message || 'ລຶບບໍ່ສຳເລັດ','error'); }
}
