<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EMO Agency • Commission &amp; Bonus VJ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:        #0B1220;
  --ink-2:      #101A2E;
  --ink-3:      #16223B;
  --line:       #233153;
  --gold:       #F5B82E;
  --gold-dim:   #8A6A22;
  --mint:       #2DD4A8;
  --coral:      #FF6B5E;
  --ice:        #6FB7FF;
  --text-hi:    #F4F2ED;
  --text-mid:   #B8C0D6;
  --text-low:   #71799A;
  --tier-c-lo:  #8C6A4E;
  --tier-c-hi:  #D9A65C;
  --tier-s-lo:  #9AAFC9;
  --tier-s-hi:  #B8E3FF;
  --hero-bg1:   #182441;
  --hero-bg2:   #0E1626;
  --hero-glow:  #F5B82E;
  --f-display: 'Sora', 'Noto Sans Lao', sans-serif;
  --f-body:    'Inter', 'Noto Sans Lao', sans-serif;
  --f-mono:    'JetBrains Mono', 'Noto Sans Lao', monospace;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --shadow-1: 0 4px 20px rgba(0,0,0,0.25);
  --shadow-2: 0 10px 40px rgba(0,0,0,0.35);
  --nav-h: 74px;
  --topbar-h: 56px;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  background:
    radial-gradient(900px 500px at 100% -10%, rgba(245,184,46,0.07), transparent 60%),
    radial-gradient(700px 500px at -10% 100%, rgba(45,212,168,0.06), transparent 60%),
    var(--ink);
  color:var(--text-hi);
  font-family:var(--f-body);
  min-height:100vh;
  overscroll-behavior-y:none;
}
::selection{ background:rgba(245,184,46,0.3); }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }
::-webkit-scrollbar-track{ background:transparent; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; }
input,select,textarea{ font-family:inherit; }
:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; border-radius:6px; }
.mono{ font-family:var(--f-mono); font-feature-settings:"tnum" 1; }
.display{ font-family:var(--f-display); }
#app{ display:flex; min-height:100vh; }
.topbar{
  position:fixed; top:0; left:0; right:0; height:var(--topbar-h);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
  background:rgba(11,18,32,0.85);
  backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--line);
  z-index:40;
}
.topbar .brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:32px; height:32px; border-radius:9px;
  background:linear-gradient(145deg, var(--gold), #c98f1c);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--f-display); font-weight:800; font-size:15px; color:#21170a;
  box-shadow:0 2px 10px rgba(245,184,46,0.35);
  flex-shrink:0;
}
.brand-text{ display:flex; flex-direction:column; line-height:1.1; }
.brand-text b{ font-family:var(--f-display); font-size:14.5px; font-weight:700; letter-spacing:.2px; }
.brand-text span{ font-size:10.5px; color:var(--text-low); letter-spacing:.4px; }
.icon-btn{
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:1px solid transparent; color:var(--text-mid);
  transition:background .15s, color .15s;
}
.icon-btn:hover{ background:var(--ink-3); color:var(--text-hi); }
.icon-btn svg{ width:20px; height:20px; }
.tabbar{
  position:fixed; left:0; right:0; bottom:0; height:var(--nav-h);
  display:flex; z-index:40;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(14px) saturate(140%);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-item{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0px; color:var(--text-low); position:relative; border:none; background:none;
}
.tab-item svg{ width:21px; height:21px; transition:transform .15s; }
.tab-item span{ font-size:9.5px; font-weight:600; letter-spacing:.2px; }
.tab-emoji-box{
  width:30px !important; height:30px !important;
  display:flex; align-items:center; justify-content:center;
  font-size:30px !important; line-height:1;
  background: none; border:none; transition: transform .15s;
}
.tab-item.active .tab-emoji-box{ transform: scale(1.12); }
.tab-item.active{ color:var(--gold); }
.tab-item.active svg{ transform:translateY(-2px); }
.sidebar{
  width:240px; flex-shrink:0;
  background:var(--ink-2); border-right:1px solid var(--line);
  padding:20px 14px; display:none; flex-direction:column; gap:4px;
  position:fixed; top:0; left:0; height:100vh; z-index:50;
  overflow-y:auto;
}
.sidebar .brand{ padding:6px 10px 22px; display:flex; align-items:center; gap:10px; }
.side-link{
  display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius-sm);
  color:var(--text-mid); font-size:14px; font-weight:600; background:none; border:none; width:100%; text-align:left;
}
.side-link svg{ width:18px; height:18px; flex-shrink:0; }
.side-link:hover{ background:var(--ink-3); color:var(--text-hi); }
.side-link.active{ background:linear-gradient(90deg, rgba(245,184,46,0.16), transparent); color:var(--gold); }
.side-section-label{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--text-low); padding:16px 12px 6px; }
.side-spacer{ flex:1; }
#main{
  flex:1; min-width:0;
  padding-top:calc(var(--topbar-h) + 14px);
  padding-bottom:calc(var(--nav-h) + 24px);
  padding-left:14px; padding-right:14px;
  max-width:1180px; margin:0 auto; width:100%;
}
.overlay{
  position:fixed; inset:0; background:rgba(5,8,16,0.6); backdrop-filter:blur(2px);
  opacity:0; pointer-events:none; transition:opacity .25s; z-index:60;
}
.overlay.show{ opacity:1; pointer-events:auto; }
.drawer{
  position:fixed; top:0; right:0; height:100%; width:84%; max-width:320px;
  background:var(--ink-2); border-left:1px solid var(--line);
  transform:translateX(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
  z-index:61; padding:18px 14px; overflow-y:auto;
  padding-top:calc(18px + env(safe-area-inset-top));
}
.drawer.show{ transform:translateX(0); }
.drawer-head{ display:flex; align-items:center; justify-content:space-between; padding:4px 6px 18px; }
.drawer-link{
  display:flex; align-items:center; gap:12px; padding:13px 12px; border-radius:var(--radius-sm);
  color:var(--text-mid); font-size:15px; font-weight:600; background:none; border:none; width:100%; text-align:left;
}
.drawer-link svg{ width:19px; height:19px; flex-shrink:0; }
.drawer-link:hover, .drawer-link.active{ background:var(--ink-3); color:var(--text-hi); }
.drawer-divider{ height:1px; background:var(--line); margin:10px 0; }
@media (min-width: 980px){
  .tabbar{ display:none; }
  .sidebar{ display:flex; }
  #main{ padding-left:254px; padding-right:24px; padding-bottom:32px; max-width:1320px; }
  .topbar{ padding-left:254px; }
  .topbar .brand{ display:none; }
  #pageTitleDesktop{ display:block !important; }
}
.page-head{ margin-bottom:18px; }
.page-head h1{ font-family:var(--f-display); font-size:22px; font-weight:700; margin:0 0 4px; }
.page-head p{ margin:0; color:var(--text-low); font-size:13.5px; }
.eyebrow{ font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--gold); margin:0 0 6px; }
.card{
  background:linear-gradient(165deg, var(--ink-3), var(--ink-2));
  border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:18px; box-shadow:var(--shadow-1);
}
.card + .card{ margin-top:14px; }
.card-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.hero-balance{
  position:relative; overflow:hidden;
  background:
    var(--hero-bg-image, none),
    radial-gradient(180px 120px at 85% -20%, var(--hero-glow), transparent 55%)
    linear-gradient(165deg, var(--hero-bg1), var(--hero-bg2));
  background-size: cover, auto, auto;
  background-position: center, center, center;
  background-repeat: no-repeat, no-repeat, no-repeat;
  border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:22px 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.hero-balance::before{
  content:''; position:absolute; inset:0;
  background: var(--hero-overlay, rgba(0,0,0,0)); pointer-events:none;
}
.hero-balance .label{ color:var(--text-mid); font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
.hero-balance .amount{ font-family:var(--f-mono); font-size:38px; font-weight:700; letter-spacing:-1px; margin:6px 0 2px; display:flex; align-items:baseline; gap:8px; }
.hero-balance .amount small{ font-size:16px; color:var(--text-low); font-weight:600; }
.hero-balance .sub-stats{ display:flex; gap:18px; margin-top:16px; flex-wrap:wrap; }
.hero-balance .sub-stat{ display:flex; flex-direction:column; gap:2px; }
.hero-balance .sub-stat .v{ font-family:var(--f-mono); font-size:16px; font-weight:600; }
.hero-balance .sub-stat .l{ font-size:11px; color:var(--text-low); }
.stat-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:14px; }
@media (min-width:620px){ .stat-grid{ grid-template-columns:repeat(4,1fr); } }
.stat-card{ background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius-md); padding:14px 14px; }
.stat-card .l{ font-size:11.5px; color:var(--text-low); margin-bottom:6px; font-weight:600; }
.stat-card .v{ font-family:var(--f-mono); font-size:19px; font-weight:700; }
.stat-card .v.mint{ color:var(--mint); } .stat-card .v.gold{ color:var(--gold); }
.tier{ display:inline-flex; align-items:center; gap:5px; padding:3px 9px 3px 7px; border-radius:20px; font-family:var(--f-mono); font-size:12px; font-weight:700; letter-spacing:.3px; border:1px solid transparent; }
.tier .gem{ width:7px; height:7px; border-radius:2px; transform:rotate(45deg); flex-shrink:0; }
.tier.tier-none{ background:var(--ink-3); color:var(--text-low); border-color:var(--line); }
.tier.tier-none .gem{ background:var(--text-low); }
.tier.tier-c{ background:rgba(217,166,92,0.12); color:var(--tier-c-hi); border-color:rgba(217,166,92,0.35); }
.tier.tier-c .gem{ background:linear-gradient(135deg,var(--tier-c-lo),var(--tier-c-hi)); box-shadow:0 0 8px rgba(217,166,92,0.5); }
.tier.tier-s{ background:rgba(184,227,255,0.12); color:var(--tier-s-hi); border-color:rgba(184,227,255,0.35); }
.tier.tier-s .gem{ background:linear-gradient(135deg,var(--tier-s-lo),var(--tier-s-hi)); box-shadow:0 0 10px rgba(184,227,255,0.6); }
.vj-row{ display:flex; align-items:center; gap:12px; padding:12px 6px; border-bottom:1px solid var(--line); }
.vj-row:last-child{ border-bottom:none; }
.vj-avatar{ width:38px; height:38px; border-radius:50%; flex-shrink:0; background:linear-gradient(145deg, var(--ink-3), var(--ink)); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:var(--f-display); font-weight:700; font-size:14px; color:var(--text-mid); }
.vj-info{ flex:1; min-width:0; }
.vj-info .name{ font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.vj-info .meta{ font-size:11.5px; color:var(--text-low); margin-top:1px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.vj-amount{ text-align:right; flex-shrink:0; }
.vj-amount .usd{ font-family:var(--f-mono); font-weight:700; font-size:14.5px; color:var(--gold); }
.vj-amount .beans{ font-size:10.5px; color:var(--text-low); margin-top:1px; }
.chip{ display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:20px; font-size:12.5px; font-weight:600; background:var(--ink-3); border:1px solid var(--line); color:var(--text-mid); white-space:nowrap; }
.chip-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin:14px 0 6px; scrollbar-width:none; }
.chip-row::-webkit-scrollbar{ display:none; }
.chip.active{ background:rgba(245,184,46,0.14); border-color:rgba(245,184,46,0.4); color:var(--gold); }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:11px 18px; border-radius:12px; font-weight:700; font-size:14px; border:1px solid transparent; transition:filter .15s, transform .1s; }
.btn svg{ width:16px; height:16px; flex-shrink:0; }
.btn:active{ transform:scale(.97); }
.btn-primary{ background:linear-gradient(145deg, var(--gold), #d99a1f); color:#21170a; box-shadow:0 4px 16px rgba(245,184,46,0.3); }
.btn-primary:hover{ filter:brightness(1.07); }
.btn-ghost{ background:var(--ink-3); color:var(--text-hi); border-color:var(--line); }
.btn-ghost:hover{ background:#1b2944; }
.btn-danger{ background:rgba(255,107,94,0.12); color:var(--coral); border-color:rgba(255,107,94,0.35); }
.btn-danger:hover{ background:rgba(255,107,94,0.2); }
.btn-sm{ padding:7px 13px; font-size:12.5px; border-radius:9px; }
.btn-block{ width:100%; }
.btn-sm svg{ width:14px; height:14px; }
.btn:disabled{ opacity:.5; pointer-events:none; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12.5px; font-weight:600; color:var(--text-mid); margin-bottom:6px; }
.field input, .field select, .field textarea{ width:100%; background:#0B1220; border:1px solid var(--line); border-radius:10px; padding:11px 12px; color:#F4F2ED; font-size:14.5px; }
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--gold); }
.field-row{ display:flex; gap:10px; }
.field-row .field{ flex:1; }
.field-hint{ font-size:11.5px; color:var(--text-low); margin-top:5px; }
.search-bar{ display:flex; align-items:center; gap:10px; background:var(--ink-2); border:1px solid var(--line); border-radius:14px; padding:11px 14px; margin-bottom:4px; }
.search-bar svg{ width:18px; height:18px; color:var(--text-low); flex-shrink:0; }
.search-bar input{ flex:1; background:none; border:none; color:var(--text-hi); font-size:15px; outline:none; }
.table-wrap{ overflow-x:auto; border-radius:var(--radius-md); border:1px solid var(--line); }
table.data{ width:100%; border-collapse:collapse; font-size:13px; min-width:760px; }
table.data th{ text-align:left; padding:11px 12px; background:var(--ink-3); color:var(--text-low); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; position:sticky; top:0; }
table.data td{ padding:10px 12px; border-top:1px solid var(--line); white-space:nowrap; }
table.data tbody tr:hover{ background:rgba(255,255,255,0.02); }
table.data .num{ font-family:var(--f-mono); text-align:right; }
.empty-state{ text-align:center; padding:48px 20px; color:var(--text-low); }
.empty-state svg{ width:28px; height:28px; margin-bottom:10px; opacity:.5; }
.empty-state h3{ color:var(--text-mid); font-size:15px; margin:0 0 6px; }
.empty-state p{ font-size:13px; margin:0; max-width:280px; margin:0 auto; }
.skeleton{ background:linear-gradient(90deg, var(--ink-2) 25%, var(--ink-3) 37%, var(--ink-2) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:10px; }
@keyframes shimmer{ 0%{background-position:100% 50%;} 100%{background-position:0 50%;} }
.modal-overlay{ position:fixed; inset:0; background:rgba(5,8,16,0.65); backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center; z-index:80; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.show{ opacity:1; pointer-events:auto; }
.modal-sheet{ background:var(--ink-2); border:1px solid var(--line); border-radius:20px 20px 0 0; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:18px 18px calc(18px + env(safe-area-inset-bottom)); transform:translateY(30px); transition:transform .25s cubic-bezier(.2,.8,.2,1); }
.modal-overlay.show .modal-sheet{ transform:translateY(0); }
@media (min-width:620px){ .modal-overlay{ align-items:center; } .modal-sheet{ border-radius:20px; max-height:84vh; } }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal-head h3{ font-family:var(--f-display); font-size:17px; margin:0; }
.modal-actions{ display:flex; gap:10px; margin-top:18px; }
.modal-actions .btn{ flex:1; }
.toast{ background:var(--ink-3); border:1px solid var(--line); color:var(--text-hi); padding:11px 18px; border-radius:30px; font-size:13.5px; font-weight:600; box-shadow:var(--shadow-2); display:flex; align-items:center; gap:8px; animation:toastIn .25s ease; pointer-events:auto; }
.toast.success{ border-color:rgba(45,212,168,0.4); }
.toast.error{ border-color:rgba(255,107,94,0.4); }
.toast .dot-ico{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.toast.success .dot-ico{ background:var(--mint); }
.toast.error .dot-ico{ background:var(--coral); }
.toast.info .dot-ico{ background:var(--ice); }
@keyframes toastIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
.sync-dot{ width:7px; height:7px; border-radius:50%; background:var(--mint); display:inline-block; box-shadow:0 0 8px var(--mint); }
.sync-dot.syncing{ background:var(--gold); box-shadow:0 0 8px var(--gold); animation:pulse 1s infinite; }
.sync-dot.error{ background:var(--coral); box-shadow:0 0 8px var(--coral); }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }
.section-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-low); margin:22px 0 10px; }
.section-label:first-child{ margin-top:0; }
.login-wrap{ min-height:calc(100vh - var(--topbar-h)); display:flex; align-items:center; justify-content:center; padding:20px; }
.login-card{ width:100%; max-width:380px; text-align:center; }
.login-mark{ width:64px; height:64px; border-radius:18px; margin:0 auto 18px; background:linear-gradient(145deg, var(--gold), #c98f1c); display:flex; align-items:center; justify-content:center; font-family:var(--f-display); font-weight:800; font-size:28px; color:#21170a; box-shadow:0 8px 30px rgba(245,184,46,0.35); }
.flex-between{ display:flex; align-items:center; justify-content:space-between; }
.text-low{ color:var(--text-low); }
.text-mint{ color:var(--mint); }
.text-coral{ color:var(--coral); }
.text-gold{ color:var(--gold); }
.mt-0{ margin-top:0 !important; }
.fade-in{ animation:fadeIn .3s ease; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
.icon-sm svg { width:18px !important; height:18px !important; }
.card .icon-wrap { width:20px; height:20px; display:inline-flex; flex-shrink:0; align-items:center; justify-content:center; }
.card .icon-wrap svg { width:20px; height:20px; }
.banner-slider{ position:relative; border-radius:var(--radius-lg); overflow:hidden; aspect-ratio:16/9; background:var(--ink-2); border:1px solid var(--line); margin-bottom:14px; }
@media (max-width: 620px){ .banner-slider{ aspect-ratio:4/2.5; } }
.banner-slide{ position:absolute; inset:0; opacity:0; transition:opacity .5s ease; pointer-events:none; }
.banner-slide.active{ opacity:1; pointer-events:auto; }
.banner-slide img{ width:100%; height:100%; object-fit:cover; display:block; cursor:pointer; }
.banner-dots{ position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:6px; z-index:5; }
.banner-dot{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.4); cursor:pointer; transition:all .2s; border:none; padding:0; }
.banner-dot.active{ background:#fff; width:18px; border-radius:4px; }
.banner-arrow{ position:absolute; top:50%; transform:translateY(-50%); width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,0.4); color:#fff; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; z-index:5; backdrop-filter:blur(4px); }
.banner-arrow.prev{ left:10px; } .banner-arrow.next{ right:10px; }
.banner-arrow svg{ width:18px; height:18px; }

function fmtMoney(n){ n = Number(n)||0; return n.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtInt(n){ return (Number(n)||0).toLocaleString('en-US'); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ name = String(name||'?').replace(/^_/,''); return name.slice(0,2).toUpperCase(); }
function tierBadgeHtml(tier){
  tier = (tier||'-').trim();
  if(!tier || tier === '-') return `<span class="tier tier-none"><span class="gem"></span>—</span>`;
  const cls = tier[0].toUpperCase()==='S' ? 'tier-s' : 'tier-c';
  return `<span class="tier ${cls}"><span class="gem"></span>${escapeHtml(tier)}</span>`;
}
function applyTheme(t) {
  const r = document.documentElement.style;
  if(t.ink)      r.setProperty('--ink',      t.ink);
  if(t.ink2)     r.setProperty('--ink-2',    t.ink2);
  if(t.ink3)     r.setProperty('--ink-3',    t.ink3);
  if(t.line)     r.setProperty('--line',     t.line);
  if(t.gold)     r.setProperty('--gold',     t.gold);
  if(t.mint)     r.setProperty('--mint',     t.mint);
  if(t.coral)    r.setProperty('--coral',    t.coral);
  if(t.ice)      r.setProperty('--ice',      t.ice);
  if(t.textHi)   r.setProperty('--text-hi',  t.textHi);
  if(t.textMid)  r.setProperty('--text-mid', t.textMid);
  if(t.textLow)  r.setProperty('--text-low', t.textLow);
  if(t.heroBg1)  r.setProperty('--hero-bg1',  t.heroBg1);
  if(t.heroBg2)  r.setProperty('--hero-bg2',  t.heroBg2);
  if(t.heroGlow) r.setProperty('--hero-glow', t.heroGlow);
  if(t.heroBgImage){
    r.setProperty('--hero-bg-image', `url('${t.heroBgImage}')`);
    r.setProperty('--hero-overlay', 'rgba(0,0,0,' + (t.heroOverlayOpacity!=null ? t.heroOverlayOpacity : 0.35) + ')');
  } else {
    r.setProperty('--hero-bg-image', 'none');
    r.setProperty('--hero-overlay', 'rgba(0,0,0,0)');
  }
  if(t.borderRadius) r.setProperty('--radius-md', t.borderRadius+'px');
  const fontMap = {
    'Inter':"'Inter','Noto Sans Lao',sans-serif",
    'Poppins':"'Poppins','Noto Sans Lao',sans-serif",
    'Kanit':"'Kanit','Noto Sans Lao',sans-serif",
    'Prompt':"'Prompt','Noto Sans Lao',sans-serif",
    'Sora':"'Sora','Noto Sans Lao',sans-serif"
  };
  if(t.fontBody    && fontMap[t.fontBody])    r.setProperty('--f-body',    fontMap[t.fontBody]);
  if(t.fontDisplay && fontMap[t.fontDisplay]) r.setProperty('--f-display', fontMap[t.fontDisplay]);
  if(t.systemName) {
    document.querySelectorAll('.brand-text b').forEach(el => el.textContent = t.systemName);
    document.title = t.systemName;
  }
  if(t.systemSub) {
    document.querySelectorAll('.brand-text span').forEach(el => el.textContent = t.systemSub);
    document.getElementById('topbarSub') && (document.getElementById('topbarSub').textContent = t.systemSub);
  }
  if(t.logoText) {
    document.querySelectorAll('.brand-mark').forEach(el => el.textContent = t.logoText);
    document.querySelectorAll('.login-mark').forEach(el => el.textContent = t.logoText);
  }
  if(t.logoUrl) {
    document.querySelectorAll('.brand-mark, .login-mark').forEach(el => {
      el.innerHTML = `<img src="${t.logoUrl}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;" onerror="this.parentElement.textContent='${t.logoText||'E'}'">`;
    });
  }
  State.theme = Object.assign({}, State.theme, t);
  localStorage.setItem('emo_theme', JSON.stringify(State.theme));
}
function darkenHex(hex, amount) {
  hex = hex.replace('#','');
  if(hex.length !== 6) return '#888';
  let r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
  r = Math.max(0, Math.round(r*(1-amount))); g = Math.max(0, Math.round(g*(1-amount))); b = Math.max(0, Math.round(b*(1-amount)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
(function(){
  const saved = localStorage.getItem('emo_theme');
  if(saved) try { applyTheme(JSON.parse(saved)); } catch(e) {}
})();

/* ============================================================================
   DATA LAYER — fetch() ໄປຫາ Google Apps Script Web App JSON API
   (ແທນທີ່ google.script.run ເກົ່າ ເພາະ frontend ນີ້ Host ຢູ່ GitHub Pages/ໂດເມນອື່ນ)
============================================================================ */
const API_BASE_URL = (window.APP_CONFIG && window.APP_CONFIG.API_BASE_URL) || '';

function checkApiConfigured(){
  const banner = document.getElementById('apiConfigBanner');
  if(!API_BASE_URL || API_BASE_URL.indexOf('script.google.com') === -1){
    if(banner) banner.classList.add('show');
    return false;
  }
  return true;
}

/**
 * ຮຽກ backend API. ອ່ານ (read-only) ໃຊ້ GET, ຂຽນ/ມີລະຫັດຜ່ານ ໃຊ້ POST.
 * fnName = ຊື່ action (ຕ້ອງກົງກັບ registry ໃນ Code.gs), args = array ຂອງ argument
 */
async function gasCall(fnName, ...args){
  if(!API_BASE_URL){
    throw new Error('API_BASE_URL ຍັງບໍ່ໄດ້ຕັ້ງຄ່າ — ແກ້ໄຂໃນ APP_CONFIG ດ້ານເທິງຂອງ index.html');
  }
  const WRITE_ACTIONS = new Set([
    'adminLogin','adminCreateMonth','adminDeleteMonth','adminSaveSummary',
    'adminSaveVj','adminDeleteVj','adminBulkImportVj',
    'saveThemeSettings','resetThemeSettings','saveBannersData'
  ]);
  const isWrite = WRITE_ACTIONS.has(fnName);

  let res, text;
  try{
    if(isWrite){
      // POST ດ້ວຍ Content-Type: text/plain ເພື່ອຫຼີກລ່ຽງ CORS preflight (Apps Script ບໍ່ຮອງຮັບ)
      res = await fetch(API_BASE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: fnName, args: args })
      });
    } else {
      const url = new URL(API_BASE_URL);
      url.searchParams.set('action', fnName);
      if(args && args.length) url.searchParams.set('args', JSON.stringify(args));
      res = await fetch(url.toString(), { method: 'GET' });
    }
    text = await res.text();
  }catch(networkErr){
    throw new Error('ເຊື່ອມຕໍ່ API ບໍ່ໄດ້ (network/CORS): ' + networkErr.message);
  }

  let payload;
  try{ payload = JSON.parse(text); }
  catch(parseErr){ throw new Error('API ຕອບກັບບໍ່ແມ່ນ JSON ທີ່ຖືກຕ້ອງ: ' + text.slice(0,200)); }

  if(!payload || payload.ok !== true){
    throw new Error((payload && payload.error) || 'API error (unknown)');
  }
  return payload.data;
}

function setView(view, opts){
  State.view = view;
  if(opts && opts.month) State.activeMonth = opts.month;
  render();
  window.scrollTo({top:0, behavior:'instant'});
}

let _bannerAutoplayTimer = null;
function startBannerAutoplay(){
  clearInterval(_bannerAutoplayTimer);
  const list = State.banners.banners || [];
  if(list.length <= 1) return;
  _bannerAutoplayTimer = setInterval(()=>{
    State.bannerSlideIdx = (State.bannerSlideIdx + 1) % list.length;
    updateBannerSlideUI();
  }, 4000);
}
function goToBannerSlide(i){
  const list = State.banners.banners || [];
  if(!list.length) return;
  State.bannerSlideIdx = ((i % list.length) + list.length) % list.length;
  updateBannerSlideUI();
  startBannerAutoplay();
}
function updateBannerSlideUI(){
  document.querySelectorAll('.banner-slide').forEach((el,i)=>{ el.classList.toggle('active', i === State.bannerSlideIdx); });
  document.querySelectorAll('.banner-dot').forEach((el,i)=>{ el.classList.toggle('active', i === State.bannerSlideIdx); });
}
function bannerSliderHtml(){
  const list = (State.banners.banners || []).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  if(!list.length) return '';
  if(State.bannerSlideIdx >= list.length) State.bannerSlideIdx = 0;
  return `
    <div class="banner-slider">
      ${list.map((b,i)=>`
        <div class="banner-slide ${i===State.bannerSlideIdx?'active':''}">
          <img src="${escapeHtml(b.imageUrl)}" onclick="${b.link?`window.open('${escapeHtml(b.link)}','_blank')`:''}" onerror="this.style.opacity='0.15'">
        </div>`).join('')}
      ${list.length>1?`
        <button class="banner-arrow prev" onclick="goToBannerSlide(${State.bannerSlideIdx-1})">${ICONS.chevron.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" style="transform:scaleX(-1)"')}</button>
        <button class="banner-arrow next" onclick="goToBannerSlide(${State.bannerSlideIdx+1})">${ICONS.chevron}</button>
        <div class="banner-dots">
          ${list.map((b,i)=>`<button class="banner-dot ${i===State.bannerSlideIdx?'active':''}" onclick="goToBannerSlide(${i})"></button>`).join('')}
        </div>`:''}
    </div>`;
}
function tickerHtml(){
  if(!State.banners.tickerEnabled || !State.banners.tickerText) return '';
  return `
    <div class="ticker-wrap">
      <div class="ticker-icon">${ICONS.spark}</div>
      <div class="ticker-track"><span>${escapeHtml(State.banners.tickerText)} &nbsp; • &nbsp; ${escapeHtml(State.banners.tickerText)}</span></div>
    </div>`;
}

/* ============================================================================
   TOAST
============================================================================ */
function toast(msg, type='info'){
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span class="dot-ico"></span><span>${escapeHtml(msg)}</span>`;
  host.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='all .25s'; setTimeout(()=>el.remove(),250); }, 2600);
}

/* ============================================================================
   MODAL
============================================================================ */
function openModal(innerHtml){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'activeModal';
  overlay.innerHTML = `<div class="modal-sheet">${innerHtml}</div>`;
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('show'));
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  const m = document.getElementById('activeModal');
  if(m){ m.classList.remove('show'); setTimeout(()=>m.remove(),200); }
  document.body.style.overflow = '';
}

/* ============================================================================
   SYNC STATUS
============================================================================ */
function setSync(status){
  State.syncStatus = status;
  const btn = document.getElementById('syncBtn');
  if(!btn) return;
  btn.innerHTML = ICONS.sync;
  btn.style.color = status==='error' ? 'var(--coral)' : (status==='syncing' ? 'var(--gold)' : '');
}

/* ============================================================================
   DATA LOADING
============================================================================ */
async function refreshData(showToast){
  setSync('syncing');
  try{
    const all = await gasCall('getAllData');
    if(!all || !Array.isArray(all) || !all.length){
      setSync('error');
      if(showToast) toast('API ຄືນຂໍ້ມູນວ່າງ — ກວດ permission Sheet / URL', 'error');
      State.loading = false;
      render();
      return;
    }
    State.months = all.map(d=>d.month);
    State.monthsData = {};
    all.forEach(d => {
      if(!d.label){
        var LAO_M = ['','ມັງກອນ','ກຸມພາ','ມີນາ','ເມສາ','ພຶດສະພາ','ມິຖຸນາ','ກໍລະກົດ','ສິງຫາ','ກັນຍາ','ຕຸລາ','ພະຈິກ','ທັນວາ'];
        var parts = (d.month||'').split('-');
        d.label = parts.length===2 ? LAO_M[parseInt(parts[1],10)]+' '+parts[0] : d.month;
      }
      if(d.vjList) d.vjList.forEach(vj => { vj.photoUrl = vj.photoUrl || ''; });
      State.monthsData[d.month] = d;
    });
    if(!State.activeMonth || !State.months.includes(State.activeMonth)){
      State.activeMonth = State.months.length ? State.months[State.months.length-1] : null;
    }
    setSync('idle');
    try{
      localStorage.setItem('emo_cache_months', JSON.stringify(State.months));
      localStorage.setItem('emo_cache_monthsData', JSON.stringify(State.monthsData));
    }catch(e){}
    if(showToast) toast('ອັບເດດຂໍ້ມູນສຳເລັດ', 'success');
    State.loading = false;
    render();
  }catch(err){
    console.error('refreshData error:', err);
    setSync('error');
    toast(err.message || 'Sync ບໍ່ສຳເລັດ', 'error');
    State.loading = false;
    render();
  }
}

/* ============================================================================
   LAYOUT RENDER
============================================================================ */
function renderShell(){
  const sideUser = document.getElementById('sideLinksUser');
  if(State.theme && State.theme.logoUrl){
    document.querySelectorAll('.brand-mark, .login-mark').forEach(el => {
      el.innerHTML = `<img src="${State.theme.logoUrl}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;" onerror="this.parentElement.textContent='${State.theme.logoText||'E'}'">`;
    });
  }
  const sideAdmin = document.getElementById('sideLinksAdmin');
  sideUser.innerHTML = `<div class="side-section-label">VJ</div>` + USER_NAV.map(n => sideLinkHtml(n)).join('');
  if(State.isAdmin){
    sideAdmin.innerHTML = `<div class="side-section-label">Admin</div>` + ADMIN_NAV.map(n => sideLinkHtml(n)).join('');
  } else {
    sideAdmin.innerHTML = '';
  }
  const authArea = document.getElementById('sideAuthArea');
  authArea.innerHTML = State.isAdmin
    ? `<button class="side-link" onclick="adminLogout()">${ICONS.logout}ອອກຈາກ Admin</button>`
    : `<button class="side-link" onclick="setView('admin-login')">${ICONS.lock}ເຂົ້າສູ່ລະບົບ Admin</button>`;

  const tabbar = document.getElementById('tabbar');
  tabbar.innerHTML = TABBAR_NAV.map(n => tabItemHtml(n)).join('');

  const drawerLinks = document.getElementById('drawerLinks');
  let dh = `<div class="section-label">ສຳລັບ VJ</div>` + USER_NAV.map(n => drawerLinkHtml(n)).join('');
  if(State.isAdmin){
    dh += `<div class="drawer-divider"></div><div class="section-label">Admin</div>` + ADMIN_NAV.map(n => drawerLinkHtml(n)).join('');
    dh += `<div class="drawer-divider"></div><button class="drawer-link" onclick="adminLogout(); closeDrawer();">${ICONS.logout}ອອກຈາກ Admin</button>`;
  } else {
    dh += `<div class="drawer-divider"></div><button class="drawer-link" onclick="setView('admin-login'); closeDrawer();">${ICONS.lock}ເຂົ້າສູ່ລະບົບ Admin</button>`;
  }
  drawerLinks.innerHTML = dh;
}
function sideLinkHtml(n){
  const active = State.view === n.id ? 'active' : '';
  return `<button class="side-link ${active}" onclick="setView('${n.id}')"><span style="font-size:16px;margin-right:2px;">${n.icon}${n.label}</button>`;
}
function tabItemHtml(n){
  const active = State.view === n.id ? 'active' : '';
  return `<button class="tab-item ${active}" onclick="setView('${n.id}')">
    <span class="tab-emoji-box">${n.icon}</span>
    <span>${n.label}</span>
  </button>`;
}
function drawerLinkHtml(n){
  const active = State.view === n.id ? 'active' : '';
  return `<button class="drawer-link ${active}" onclick="setView('${n.id}'); closeDrawer();"><span style="font-size:16px;margin-right:2px;">${n.icon}${n.label}</button>`;
}
function openDrawer(){ document.getElementById('overlay').classList.add('show'); document.getElementById('drawer').classList.add('show'); }
function closeDrawer(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('drawer').classList.remove('show'); }

/* ============================================================================
   ADMIN AUTH
============================================================================ */
async function adminLoginSubmit(password){
  try{
    const res = await gasCall('adminLogin', password);
    if(res.ok){
      State.isAdmin = true;
      State.adminPassword = password;
      sessionStorage.setItem('emo_admin_pw', password);
      toast('ເຂົ້າສູ່ລະບົບ Admin ສຳເລັດ', 'success');
      renderShell();
      setView('admin-dashboard');
    } else {
      toast(res.error || 'ລະຫັດບໍ່ຖືກຕ້ອງ', 'error');
    }
  }catch(err){
    toast(err.message || 'ເຂົ້າສູ່ລະບົບບໍ່ສຳເລັດ', 'error');
  }
}
function adminLogout(){
  State.isAdmin = false; State.adminPassword = null;
  sessionStorage.removeItem('emo_admin_pw');
  toast('ອອກຈາກລະບົບ Admin ແລ້ວ', 'info');
  renderShell();
  setView('home');
}

/* ============================================================================
   MAIN RENDER DISPATCH
============================================================================ */
function render(){
  renderShell();
  const main = document.getElementById('main');
  const titles = {
    home:'ໜ້າຫຼັກ', bonus:'ໂບນັດຂອງຂ້ອຍ', livedata:'VJ Live Data',newvjactive:'VJ ໃໝ່ Active',
    leaderboard:'ອັນດັບ VJ', lookup:'ຄົ້ນຫາ VJ',
    'admin-login':'ເຂົ້າສູ່ລະບົບ Admin', 'admin-dashboard':'ພາບລວມ Admin',
    'admin-months':'ຈັດການເດືອນ', 'admin-vj':'ຈັດການ VJ', 'admin-banners':'ຈັດການແບນເນີ້', 'admin-summary':'ສະຫຼຸບ Agency','admin-settings':'ຕັ້ງຄ່າ & ສີ',
  };
  document.getElementById('pageTitleDesktop').textContent = titles[State.view] || '';

  if(State.loading){ main.innerHTML = skeletonHtml(); return; }

  switch(State.view){
    case 'home': main.innerHTML = renderHome(); break;
    case 'bonus': main.innerHTML = renderBonus(); break;
    case 'leaderboard': main.innerHTML = renderLeaderboard(); break;
    case 'lookup': main.innerHTML = renderLookup(); break;
    case 'livedata': main.innerHTML = renderVjLiveData(); break;
    case 'newvjactive': main.innerHTML = renderNewVjActive(); break;
    case 'admin-login': main.innerHTML = renderAdminLogin(); break;
    case 'admin-dashboard': main.innerHTML = State.isAdmin ? renderAdminDashboard() : renderAdminLogin(); break;
    case 'admin-months': main.innerHTML = State.isAdmin ? renderAdminMonths() : renderAdminLogin(); break;
    case 'admin-vj': main.innerHTML = State.isAdmin ? renderAdminVjManage() : renderAdminLogin(); break;
    case 'admin-banners': main.innerHTML = State.isAdmin ? renderAdminBanners() : renderAdminLogin(); break;
    case 'admin-settings': main.innerHTML = State.isAdmin ? renderAdminSettings() : renderAdminLogin(); break;
    default: main.innerHTML = renderHome();
  }
  main.classList.remove('fade-in'); void main.offsetWidth; main.classList.add('fade-in');

  if(State.theme && State.theme.logoUrl){
    document.querySelectorAll('.brand-mark, .login-mark').forEach(el => {
      el.innerHTML = `<img src="${State.theme.logoUrl}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;" onerror="this.parentElement.textContent='${State.theme.logoText||'E'}'">`;
    });
  }
  afterRenderHook();
}
function skeletonHtml(){
  return `
    <div class="skeleton" style="height:130px; margin-bottom:14px;"></div>
    <div class="stat-grid">${[1,2,3,4].map(()=>`<div class="skeleton" style="height:74px;"></div>`).join('')}</div>
    <div class="skeleton" style="height:220px; margin-top:14px;"></div>`;
}
function afterRenderHook(){
  if(document.querySelector('.banner-slider')){ updateBannerSlideUI(); startBannerAutoplay(); }
  const searchInput = document.getElementById('vjSearchInput');
  if(searchInput){
    searchInput.addEventListener('input', e => {
      State.searchQuery = e.target.value;
      if(State.view === 'livedata' && State.isAdmin) {
        const liveList = document.getElementById('vjLiveList');
        if(liveList && _vjLiveCache) {
          const q = e.target.value.trim().toLowerCase();
          const filtered = q ? _vjLiveCache.filter(v =>
            String(v.bigoId).toLowerCase().includes(q) || (v.vjName || '').toLowerCase().includes(q)
          ) : _vjLiveCache;
          liveList.innerHTML = filtered.length ? filtered.map(vj => vjLiveCardHtml(vj)).join('') : `<div class="empty-state"><p>ບໍ່ພົບ VJ</p></div>`;
        }
        return;
      }
      const list = document.getElementById('vjSearchResults');
      if(list) list.innerHTML = renderVjSearchResultsInner();
    });
  }
  const adminSearchInput = document.getElementById('vjAdminSearchInput');
  if(adminSearchInput){
    adminSearchInput.addEventListener('input', e => {
      State.searchQuery = e.target.value;
      const mobileList = document.getElementById('vjMobileList');
      if(!mobileList) return;
      const month = State.activeMonth || State.months[State.months.length-1];
      const data = State.monthsData[month];
      let list = [...(data.vjList||[])];
      const q = State.searchQuery.trim().toLowerCase();
      if(q) list = list.filter(v => String(v.bigoId).toLowerCase().includes(q));
      mobileList.innerHTML = list.length ? list.map(vj => adminVjRowHtml(month, vj)).join('') : `<div class="empty-state" style="padding:24px;"><p>ບໍ່ພົບ VJ</p></div>`;
    });
  }
}

(async function init(){
  checkApiConfigured();
  // Step 0: ໂຫລດ cache ຄັ້ງກ່ອນ ສະແດງທັນທີ
  try{
    const cachedMonths = JSON.parse(localStorage.getItem('emo_cache_months') || 'null');
    const cachedData = JSON.parse(localStorage.getItem('emo_cache_monthsData') || 'null');
    const cachedBanners = JSON.parse(localStorage.getItem('emo_cache_banners') || 'null');
    if(cachedMonths && cachedData){
      State.months = cachedMonths;
      State.monthsData = cachedData;
      State.activeMonth = cachedMonths[cachedMonths.length-1] || null;
      State.loading = false;
      if(cachedBanners){ State.banners = cachedBanners; }
      render();
    } else {
      State.loading = true;
      render();
    }
  }catch(e){ State.loading = true; render(); }

  // Step 1: sync ຂໍ້ມູນຈິງຈາກ API
  try {
    await Promise.all([
      sessionStorage.getItem('emo_admin_pw')
        ? gasCall('adminLogin', sessionStorage.getItem('emo_admin_pw'))
            .then(res => { if(res.ok){ State.isAdmin = true; State.adminPassword = sessionStorage.getItem('emo_admin_pw'); } })
            .catch(()=>{})
        : Promise.resolve(),

      gasCall('getAllData').then(all => {
        if(all && Array.isArray(all) && all.length){
          State.months = all.map(d => d.month);
          State.monthsData = {};
          all.forEach(d => {
            if(!d.label) {
              var LAO_M = ['','ມັງກອນ','ກຸມພາ','ມີນາ','ເມສາ','ພຶດສະພາ','ມິຖຸນາ','ກໍລະກົດ','ສິງຫາ','ກັນຍາ','ຕຸລາ','ພະຈິກ','ທັນວາ'];
              var parts = (d.month||'').split('-');
              d.label = parts.length===2 ? LAO_M[parseInt(parts[1],10)]+' '+parts[0] : d.month;
            }
            if(d.vjList) d.vjList.forEach(vj => { vj.photoUrl = vj.photoUrl || ''; });
            State.monthsData[d.month] = d;
          });
          State.activeMonth = State.months[State.months.length - 1] || null;
          try{
            localStorage.setItem('emo_cache_months', JSON.stringify(State.months));
            localStorage.setItem('emo_cache_monthsData', JSON.stringify(State.monthsData));
          }catch(e){}
        } else {
          console.warn('getAllData empty on init');
        }
      }).catch(err=>{ console.error('getAllData failed:', err); toast(err.message,'error'); }),

      gasCall('getThemeSettings').then(t => { if(t) applyTheme(t); }).catch(()=>{}),
      gasCall('getBannersData').then(b => { if(b){ State.banners = b; startBannerAutoplay(); try{ localStorage.setItem('emo_cache_banners', JSON.stringify(b)); }catch(e){} } }).catch(()=>{}),
      gasCall('getVjLiveData', null).then(res => {
        if (res && !res.error) {
          _vjLiveCache = res.list; State.liveMonths = res.months; State.activeLiveMonth = res.month;
        }
      }).catch(()=>{}),
      gasCall('getNewVjActiveData', null).then(res => {

function saveMyBigoId(){
  const val = document.getElementById('myBigoIdInput').value.trim();
  if(!val){ toast('ກະລຸນາປ້ອນ Bigo ID', 'error'); return; }
  State.myBigoId = val;
  localStorage.setItem('emo_my_bigoid', val);
  State.lookupHistory = null;
  render();
}
function clearMyBigoId(){
  State.myBigoId = ''; State.lookupHistory = null;
  localStorage.removeItem('emo_my_bigoid');
  render();
}
async function fetchMyHistory(){
  try{
    const res = await gasCall('findVjByBigoId', State.myBigoId);
    if(res && res.length > 0){ State.lookupHistory = res; }
    else {
      const target = String(State.myBigoId).trim().toLowerCase();
      const out = [];
      State.months.forEach(m => {
        (State.monthsData[m].vjList || []).forEach(vj => {
          if(String(vj.bigoId).trim().toLowerCase() === target){ out.push({ month: m, label: State.monthsData[m].label, vj }); }
        });
      });
      State.lookupHistory = out;
    }
  }catch(err){
    const target = String(State.myBigoId).trim().toLowerCase();
    const out = [];
    State.months.forEach(m => {
      (State.monthsData[m].vjList || []).forEach(vj => {
        if(String(vj.bigoId).trim().toLowerCase() === target){ out.push({ month: m, label: State.monthsData[m].label, vj }); }
      });
    });
    State.lookupHistory = out;
    if(!out.length) toast('ການຄົ້ນຫາ API ບໍ່ສຳເລັດ — ໃຊ້ຂໍ້ມູນ local', 'info');
  }
  render();
}

  document.querySelector('#bannerForm [data-key="link"]').value = banner.link || '';

async function submitBannerForm(existingId){
  const inputs = document.querySelectorAll('#bannerForm [data-key]');
  const payload = {};
  inputs.forEach(inp => payload[inp.dataset.key] = inp.value);
  if(!payload.imageUrl){ toast('ກະລຸນາປ້ອນລິ້ງຮູບ','error'); return; }
  payload.order = Number(payload.order)||0;
  payload.id = existingId || ('b_' + Date.now());
  const list = (State.banners.banners || []).slice();
  const idx = list.findIndex(b=>b.id===payload.id);
  if(idx>-1) list[idx] = payload; else list.push(payload);
  State.banners.banners = list;
  try{
    await gasCall('saveBannersData', State.adminPassword, State.banners);
    toast('ບັນທຶກແບນເນີ້ສຳເລັດ','success');
    closeModal();
    startBannerAutoplay();
    setView('admin-banners');
  }catch(err){ toast(err.message || 'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}
async function deleteBanner(id){
  State.banners.banners = (State.banners.banners||[]).filter(b=>b.id!==id);
  try{
    await gasCall('saveBannersData', State.adminPassword, State.banners);
    toast('ລຶບແບນເນີ້ສຳເລັດ','success');
    setView('admin-banners');
  }catch(err){ toast(err.message || 'ລຶບບໍ່ສຳເລັດ','error'); }
}
async function saveTickerSettings(){
  State.banners.tickerText = document.getElementById('tickerText').value;
  State.banners.tickerEnabled = document.getElementById('tickerEnabled').value === 'true';
  try{
    await gasCall('saveBannersData', State.adminPassword, State.banners);
    toast('ບັນທຶກ Ticker ສຳເລັດ','success');

function previewLogoUrl(url) {
  const wrap = document.getElementById('logoPreviewWrap');
  const img  = document.getElementById('logoPreviewImg');
  if(!wrap || !img) return;
  if(url) {
    img.src = url; img.style.display = 'block'; wrap.style.display = 'block';
    document.querySelectorAll('.brand-mark, .login-mark').forEach(el => { el.innerHTML = `<img src="${escapeHtml(url)}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;">`; });
  } else { wrap.style.display = 'none'; }
}
function previewHeroBg(url){ document.documentElement.style.setProperty('--hero-bg-image', url ? `url('${url}')` : 'none'); }
function clearHeroBg(){ document.getElementById('heroBgImage').value = ''; previewHeroBg(''); toast('ລຶບຮູບພື້ນຫຼັງແລ້ວ (ຍັງບໍ່ໄດ້ບັນທຶກ)','info'); }
function liveColorPreview(key, val) {
  const cssMap = { ink:'--ink', ink2:'--ink-2', ink3:'--ink-3', line:'--line', gold:'--gold', mint:'--mint', coral:'--coral', ice:'--ice', textHi:'--text-hi', textMid:'--text-mid', textLow:'--text-low', heroBg1:'--hero-bg1', heroBg2:'--hero-bg2', heroGlow:'--hero-glow' };
  if(cssMap[key]) document.documentElement.style.setProperty(cssMap[key], val);
}
function previewFont(type, val){
  const fontMap = { 'Inter':"'Inter','Noto Sans Lao',sans-serif", 'Poppins':"'Poppins','Noto Sans Lao',sans-serif", 'Kanit':"'Kanit','Noto Sans Lao',sans-serif", 'Prompt':"'Prompt','Noto Sans Lao',sans-serif", 'Sora':"'Sora','Noto Sans Lao',sans-serif" };
  if(type==='body'    && fontMap[val]) document.documentElement.style.setProperty('--f-body',    fontMap[val]);
  if(type==='display' && fontMap[val]) document.documentElement.style.setProperty('--f-display', fontMap[val]);
}
async function saveThemeAll(){
  const newT = Object.assign({}, State.theme);
  document.querySelectorAll('.color-picker[data-key]').forEach(el => { if(/^#[0-9a-fA-F]{6}$/.test(el.value)) newT[el.dataset.key] = el.value; });
  const fb = document.getElementById('fontBody');    if(fb) newT.fontBody = fb.value;
  const fd = document.getElementById('fontDisplay'); if(fd) newT.fontDisplay = fd.value;
  const br = document.getElementById('borderRadius'); if(br) newT.borderRadius = br.value;
  const lt = document.getElementById('logoText');    if(lt) newT.logoText = lt.value;
  const lc = document.getElementById('logoColor');   if(lc) newT.logoColor = lc.value;
  const sn = document.getElementById('systemName');  if(sn) newT.systemName = sn.value;
  const ss2 = document.getElementById('systemSub');  if(ss2) newT.systemSub = ss2.value;
  const lu = document.getElementById('logoUrl');     if(lu) newT.logoUrl = lu.value;
  const hbg = document.getElementById('heroBgImage');        if(hbg) newT.heroBgImage = hbg.value;
  const hov = document.getElementById('heroOverlayOpacity');  if(hov) newT.heroOverlayOpacity = parseFloat(hov.value);
  applyTheme(newT);
  if(newT.logoUrl){ document.querySelectorAll('.brand-mark,.login-mark').forEach(el=>{ el.innerHTML=`<img src="${newT.logoUrl}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;" onerror="this.parentElement.textContent='${newT.logoText||'E'}'">`; }); }
  try{
    await gasCall('saveThemeSettings', State.adminPassword, newT);
    toast('ບັນທຶກ Theme ສຳເລັດ ✓ (ທຸກເຄື່ອງ)','success');
  }catch(e){
    console.error('saveThemeSettings error:', e);
    toast('⚠️ ບັນທຶກຂຶ້ນ Server ບໍ່ສຳເລັດ! (' + (e && e.message ? e.message : 'unknown error') + ')', 'error');
  }
}
async function resetTheme(){
  const def = {ink:'#0B1220',ink2:'#101A2E',ink3:'#16223B',line:'#233153',gold:'#F5B82E',mint:'#2DD4A8',coral:'#FF6B5E',ice:'#6FB7FF',textHi:'#F4F2ED',textMid:'#B8C0D6',textLow:'#71799A',btnText:'#21170a',fontBody:'Inter',fontDisplay:'Sora',borderRadius:'16',logoText:'E',logoColor:'#F5B82E',systemName:'EMO Agency',systemSub:'Commission & Bonus VJ',logoUrl:''};
  applyTheme(def);
  localStorage.removeItem('emo_theme');
  try{ await gasCall('resetThemeSettings', State.adminPassword); }catch(e){}
  toast('Reset Theme ແລ້ວ','success');
  setView('admin-settings');
}
function applyPreset(name){
  const PRESETS = {
    dark:   {ink:'#0B1220',ink2:'#101A2E',ink3:'#16223B',line:'#233153',gold:'#F5B82E',mint:'#2DD4A8',coral:'#FF6B5E',ice:'#6FB7FF',textHi:'#F4F2ED',textMid:'#B8C0D6',textLow:'#71799A',btnText:'#21170a'},
    light:  {ink:'#F8F6F0',ink2:'#FFFFFF',ink3:'#EDE9E0',line:'#D4CCBA',gold:'#D4880A',mint:'#0D9B7A',coral:'#C0392B',ice:'#1A6AB2',textHi:'#1A1208',textMid:'#4A4030',textLow:'#8A7A60',btnText:'#FFFFFF'},
    purple: {ink:'#0D0B1E',ink2:'#13112B',ink3:'#1C1A38',line:'#2D2A5A',gold:'#C084FC',mint:'#4ADE80',coral:'#F87171',ice:'#818CF8',textHi:'#F5F3FF',textMid:'#C4B5FD',textLow:'#8B5CF6',btnText:'#F5F3FF'},
    ocean:  {ink:'#061220',ink2:'#0A1F35',ink3:'#102946',line:'#1B4F72',gold:'#38BDF8',mint:'#34D399',coral:'#FB923C',ice:'#60A5FA',textHi:'#F0F9FF',textMid:'#BAE6FD',textLow:'#7DD3FC',btnText:'#0C1A2B'},
    forest: {ink:'#0A1208',ink2:'#0F1C0D',ink3:'#162614',line:'#2D4A28',gold:'#86EFAC',mint:'#6EE7B7',coral:'#FCA5A5',ice:'#A7F3D0',textHi:'#F0FDF4',textMid:'#BBF7D0',textLow:'#4ADE80',btnText:'#0A1208'},
    rose:   {ink:'#1A0A10',ink2:'#25101A',ink3:'#321524',line:'#5A2840',gold:'#F472B6',mint:'#FB7185',coral:'#FBBF24',ice:'#F9A8D4',textHi:'#FDF2F8',textMid:'#FBCFE8',textLow:'#F9A8D4',btnText:'#1A0A10'},
  };
  const p = PRESETS[name];
  if(!p){ toast('ບໍ່ພົບ Preset','error'); return; }
  applyTheme(p);
  Object.keys(p).forEach(k=>{
    const picker = document.querySelector(`[data-key="${k}"].color-picker`);
    const hex = document.getElementById('hex_'+k);
    if(picker && /^#[0-9a-fA-F]{6}$/.test(p[k])) picker.value = p[k];
    if(hex && p[k]) hex.value = p[k];
  });
  toast('ໃຊ້ Preset: '+name,'info');
}

let _vjLiveCache = null;
let _vjLiveLoading = false;
let _vjLiveAutoRefreshTimer = null;
async function fetchVjLiveData(monthKey) {
  if (_vjLiveLoading) return;
  if (!_vjLiveCache) {
    try { _vjLiveCache = JSON.parse(localStorage.getItem('emo_cache_vjlive') || 'null'); } catch(e){}
  }
  _vjLiveLoading = true;
  try {
    const res = await gasCall('getVjLiveData', monthKey || State.activeLiveMonth || null);
    if (res && !res.error) {
      _vjLiveCache = Array.isArray(res.list) ? res.list : [];
       try{ localStorage.setItem('emo_cache_vjlive', JSON.stringify(_vjLiveCache)); }catch(e){}
      if (Array.isArray(res.months) && res.months.length) State.liveMonths = res.months;
      State.activeLiveMonth = res.month || State.activeLiveMonth;
    } else {
      _vjLiveCache = null;
      toast((res && res.error) || 'ໂຫລດ Live Data ບໍ່ສຳເລັດ', 'error');
    }
  } catch(e) {
    _vjLiveCache = null;
    toast(e.message || 'ໂຫລດ Live Data ບໍ່ສຳເລັດ', 'error');
  }
  _vjLiveLoading = false;
  if (State.view === 'livedata') {
    document.getElementById('main').innerHTML = renderVjLiveData();
    afterRenderHook();
  }
}
function switchLiveMonth(key){ State.activeLiveMonth = key; _vjLiveCache = null; fetchVjLiveData(key); }
function startVjLiveAutoRefresh(){
  stopVjLiveAutoRefresh();
  _vjLiveAutoRefreshTimer = setInterval(()=>{
    if(State.view === 'livedata' && !_vjLiveLoading){ fetchVjLiveData(State.activeLiveMonth); }
    else if(State.view !== 'livedata'){ stopVjLiveAutoRefresh(); }
  }, 60000);
}
function stopVjLiveAutoRefresh(){ if(_vjLiveAutoRefreshTimer){ clearInterval(_vjLiveAutoRefreshTimer); _vjLiveAutoRefreshTimer = null; } }
function renderVjLiveData() {
  startVjLiveAutoRefresh();
  if (!_vjLiveCache && !_vjLiveLoading) { fetchVjLiveData(); return skeletonHtml(); }
  if (_vjLiveLoading && !_vjLiveCache) return skeletonHtml();
  const list = _vjLiveCache || [];
  if (State.isAdmin) {
    const q = (State.searchQuery || '').trim().toLowerCase();
    const filtered = q ? list.filter(v => String(v.bigoId).toLowerCase().includes(q) || (v.vjName || '').toLowerCase().includes(q)) : list;
    const activeVj = list.filter(v => v.beansMonth > 0).length;
    const totalBeans = list.reduce((a, v) => a + (v.beansMonth || 0), 0);
    return `
      <div class="page-head fade-in">
        <p class="eyebrow">Live Data</p>
        <h1>📊 ໄລ້ດາຕ້າ VJ</h1>
        <p>ຂໍ້ມູນ Realtime ຈາກ Bigo — ${list.length} VJ ທັງໝົດ${State.activeLiveMonth?(' · '+escapeHtml((State.liveMonths.find(m=>m.key===State.activeLiveMonth)||{}).label||'')):''}</p>
      </div>
      ${State.liveMonths && State.liveMonths.length ? `<div class="chip-row">${State.liveMonths.map(m => `<button class="chip ${m.key===State.activeLiveMonth?'active':''}" onclick="switchLiveMonth('${m.key}')">${escapeHtml(m.label)}</button>`).join('')}</div>` : ''}
      <div class="stat-grid" style="margin-bottom:14px;">
        <div class="stat-card"><div class="l">VJ ທັງໝົດ</div><div class="v">${list.length}</div></div>
        <div class="stat-card"><div class="l">VJ Active ເດືອນນີ້</div><div class="v mint">${activeVj}</div></div>
        <div class="stat-card"><div class="l">Beans ລວມເດືອນນີ້</div><div class="v gold">${fmtInt(totalBeans)}</div></div>
        <div class="stat-card"><div class="l">VJ ໃໝ່ (< 3 ເດືອນ)</div><div class="v">${list.filter(v => v.isNewVj).length}</div></div>
      </div>
      <div class="search-bar" style="margin-bottom:10px;">
        ${ICONS.search}
        <input id="vjSearchInput" type="text" placeholder="ຄົ້ນຫາ BIGO ID ຫຼື ຊື່ VJ..." value="${escapeHtml(State.searchQuery)}">
        <button class="btn btn-ghost btn-sm" onclick="_vjLiveCache=null; fetchVjLiveData(State.activeLiveMonth); toast('ກຳລັງ Refresh...','info');" style="flex-shrink:0; padding:6px 10px;">🔄</button>
      </div>
      <div id="vjLiveList">${filtered.length ? filtered.map(vj => vjLiveCardHtml(vj)).join('') : `<div class="empty-state"><p>ບໍ່ພົບ VJ</p></div>`}</div>`;
  }
  const myId = State.myBigoId || '';
  const liveSearchId = State._liveSearchId || '';
  if (!liveSearchId) {
    return `
      <div class="page-head fade-in">
        <p class="eyebrow">Live Data</p>
        <h1>📊 ໄລ້ດາຕ້າ VJ</h1>
        <p>ປ້ອນ Bigo ID ຂອງທ່ານ ເພື່ອກວດສອບຂໍ້ມູນ Live ແລະ ໂບນັດ</p>
      </div>
      <div class="card" style="margin-top:8px;">
        <div class="field"><label>Bigo ID ຂອງທ່ານ</label><input id="liveSearchInput" type="text" placeholder="ຕົວຢ່າງ: Dao_220" value="${escapeHtml(myId)}" onkeydown="if(event.key==='Enter') submitLiveSearch();"></div>
        <button class="btn btn-primary btn-block" onclick="submitLiveSearch()">${ICONS.search} ກວດສອບຂໍ້ມູນ Live ຂອງຂ້ອຍ</button>
      </div>
      <div class="card" style="margin-top:14px; background:rgba(111,183,255,0.06); border-color:rgba(111,183,255,0.25);">
        <p style="font-size:13px; color:var(--text-mid); margin:0; line-height:1.7;">💡 ໃສ່ Bigo ID ຂອງທ່ານ ເພື່ອເບິ່ງ:<br>• Beans ທີ່ເຄີຍໄດ້ເດືອນນີ້<br>• ຊົ່ວໂມງ Livestream ທີ່ສะສົມ<br>• Grade ແລະ ໂບນັດທີ່ຈະໄດ້ຮັບ<br>• ຈຳນວນ beans ທີ່ຍັງຂາດ</p>
      </div>`;
  }
  const found = list.find(v => String(v.bigoId).trim().toLowerCase() === liveSearchId.toLowerCase());
  return `
    <div class="page-head fade-in"><p class="eyebrow">Live Data</p><h1>📊 ໄລ້ດາຕ້າ VJ</h1></div>
    ${State.liveMonths && State.liveMonths.length ? `<div class="chip-row">${State.liveMonths.map(m => `<button class="chip ${m.key===State.activeLiveMonth?'active':''}" onclick="switchLiveMonth('${m.key}')">${escapeHtml(m.label)}</button>`).join('')}</div>` : ''}
    <div style="display:flex; gap:8px; margin-bottom:14px; align-items:center;">
      <div class="search-bar" style="flex:1; margin-bottom:0;">${ICONS.search}<input id="liveSearchInput" type="text" placeholder="Bigo ID..." value="${escapeHtml(liveSearchId)}" onkeydown="if(event.key==='Enter') submitLiveSearch();"></div>
      <button class="btn btn-primary btn-sm" onclick="submitLiveSearch()">ຄົ້ນຫາ</button>
      <button class="btn btn-ghost btn-sm" onclick="_vjLiveCache=null; State._liveSearchId=liveSearchId; fetchVjLiveData(State.activeLiveMonth);">🔄</button>
    </div>
    ${found ? vjLiveCardHtml(found) : `<div class="card" style="text-align:center; padding:40px 20px;"><div style="font-size:36px; margin-bottom:12px;">🔍</div><h3 style="margin:0 0 8px; color:var(--text-mid);">ບໍ່ພົບ Bigo ID ນີ້</h3><p style="color:var(--text-low); font-size:13px; margin:0;">ກວດສອບການສະກົດ ID ອີກຄັ້ງ ຫຼື ຕິດຕໍ່ Admin</p></div>`}
    <button class="btn btn-ghost btn-block" style="margin-top:14px;" onclick="State._liveSearchId=''; render();">← ກັບໄປໜ້າຄົ້ນຫາ</button>`;
}
function submitLiveSearch() {
  const input = document.getElementById('liveSearchInput');
  if (!input || !input.value.trim()) { toast('ກະລຸນາປ້ອນ Bigo ID', 'error'); return; }
  State._liveSearchId = input.value.trim();
  if (_vjLiveCache) { render(); return; }
  fetchVjLiveData(); render();
}
function findPhotoUrlByBigoId(bigoId) {
  if (!bigoId) return '';
  const target = String(bigoId).trim().toLowerCase();
  for (const m of State.months) {
    const list = (State.monthsData[m] && State.monthsData[m].vjList) || [];
    for (const v of list) { if (String(v.bigoId).trim().toLowerCase() === target && v.photoUrl) return v.photoUrl; }
  }
  return '';
}
function vjLiveCardHtml(vj) {
  const isActive = vj.beansMonth > 0 || vj.hoursMonth > 0;
  const gradePct = vj.nextBeanTarget > 0 ? Math.min(100, Math.round(vj.beansMonth / vj.nextBeanTarget * 100)) : 100;
  const hoursPct = Math.min(100, Math.round(vj.hoursMonth / vj.reqHours * 100));
  const gradeColor = vj.gradeReached ? 'var(--gold)' : 'var(--text-low)';
  const hoursColor = vj.hoursReqMet ? 'var(--mint)' : 'var(--coral)';
  const gradeBarColor = vj.nextGrade === 'MAX' ? 'linear-gradient(90deg,var(--gold),var(--mint))' : gradePct >= 80 ? 'linear-gradient(90deg,var(--gold),#e8a800)' : gradePct >= 50 ? 'linear-gradient(90deg,var(--ice),var(--gold))' : 'linear-gradient(90deg,var(--coral),var(--ice))';
  const statusBadge = vj.isNewVj ? `<span style="background:rgba(45,212,168,0.15);color:var(--mint);border:1px solid rgba(45,212,168,0.4);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;">VJ ໃໝ່</span>` : `<span style="background:rgba(111,183,255,0.15);color:var(--ice);border:1px solid rgba(111,183,255,0.4);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;">VJ ເກົ່າ</span>`;
  const typeBadge = vj.isOnlyBigo ? `<span style="background:rgba(245,184,46,0.15);color:var(--gold);border:1px solid rgba(245,184,46,0.4);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;">Only Bigo</span>` : `<span style="background:rgba(184,192,214,0.15);color:var(--text-mid);border:1px solid var(--line);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;">Official</span>`;
  return `
    <div class="card" style="margin-bottom:10px; padding:14px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="width:42px;height:42px;border-radius:50%;flex-shrink:0;background:linear-gradient(145deg,var(--ink-3),var(--ink));border:2px solid ${isActive ? 'var(--gold)' : 'var(--line)'};display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-weight:700;font-size:14px;color:var(--text-mid);overflow:hidden;">${(() => { const purl = findPhotoUrlByBigoId(vj.bigoId); return purl ? `<img src="${escapeHtml(purl)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;">${initials(vj.bigoId)}</span>` : initials(vj.bigoId); })()}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(vj.vjName || vj.bigoId)}</div>
          <div style="font-size:11.5px;color:var(--text-low);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;"><span class="mono">${escapeHtml(vj.bigoId)}</span>${statusBadge}${typeBadge}<span>👥 ${fmtInt(vj.fans)}</span></div>
        </div>
        <div style="text-align:right;flex-shrink:0;"><div style="font-family:var(--f-mono);font-weight:700;font-size:15px;color:${gradeColor};">${vj.currentGrade !== '-' ? vj.currentGrade : '—'}</div><div style="font-size:10.5px;color:var(--text-low);">Grade</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;">
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:14px;font-weight:700;color:var(--gold);">${fmtInt(vj.beansMonth)}</div><div style="font-size:10px;color:var(--text-low);">Beans เดือนนี้</div></div>
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:14px;font-weight:700;color:${hoursColor};">${vj.hoursMonth.toFixed(1)}h</div><div style="font-size:10px;color:var(--text-low);">ชั่วโมง/${vj.reqHours}h</div></div>
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:14px;font-weight:700;color:var(--text-mid);">${vj.daysLeft}</div><div style="font-size:10px;color:var(--text-low);">วันเหลือ</div></div>
      </div>
      <div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;"><span style="color:var(--text-low);">Beans → ${vj.nextGrade !== 'MAX' ? vj.nextGrade : '🏆 MAX'}</span><span style="color:var(--gold);font-weight:600;">${fmtInt(vj.beansMonth)} / ${vj.nextGrade !== 'MAX' ? fmtInt(vj.nextBeanTarget) : '✓'}</span></div>
        <div style="height:7px;background:var(--ink);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${gradePct}%;background:${gradeBarColor};border-radius:5px;transition:width 0.5s;"></div></div>
        ${vj.needBeans > 0 ? `<div style="font-size:10.5px;color:var(--coral);margin-top:3px;">⚠️ ຂາດ ${fmtInt(vj.needBeans)} beans ເພື່ອ ${vj.nextGrade}</div>` : vj.nextGrade !== 'MAX' ? '' : `<div style="font-size:10.5px;color:var(--mint);margin-top:3px;">✅ ຮອດ Grade ສູງສຸດແລ້ວ!</div>`}
      </div>
      <div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;"><span style="color:var(--text-low);">ຊົ່ວໂມງ Livestream</span><span style="color:${hoursColor};font-weight:600;">${vj.hoursMonth.toFixed(1)} / ${vj.reqHours} ຊ.ມ.</span></div>
        <div style="height:7px;background:var(--ink);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${hoursPct}%;background:${vj.hoursReqMet ? 'linear-gradient(90deg,var(--mint),#1ab88c)' : 'linear-gradient(90deg,var(--coral),var(--gold))' };border-radius:5px;"></div></div>
        ${!vj.hoursReqMet ? `<div style="font-size:10.5px;color:var(--coral);margin-top:3px;">⚠️ ຂາດ ${(vj.reqHours - vj.hoursMonth).toFixed(1)} ຊ.ມ.</div>` : `<div style="font-size:10.5px;color:var(--mint);margin-top:3px;">✅ ຊົ່ວໂມງຄົບ!</div>`}
      </div>
      ${vj.currentBonus > 0 ? `<div style="background:rgba(245,184,46,0.08);border:1px solid rgba(245,184,46,0.25);border-radius:10px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;color:var(--text-mid);">🎁 ໂບນັດທີ່ຈະໄດ້ (${vj.currentGrade})${vj.bonusIsPercent ? ` — ${Math.round((vj.currentBonus/vj.beansMonth)*100)}%` : ''}</span><span style="font-family:var(--f-mono);font-weight:700;color:var(--gold);">${fmtInt(vj.currentBonus)} beans</span></div>` : `<div style="background:rgba(255,107,94,0.06);border:1px solid rgba(255,107,94,0.2);border-radius:10px;padding:8px 10px;"><span style="font-size:12px;color:var(--text-low);">ຍັງບໍ່ຮອດ Grade — ຕ້ອງການ ${fmtInt(vj.needBeans)} beans ອີກ (${vj.nextGrade})</span></div>`}
      <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:10.5px;color:var(--text-low);"><span>📅 ເລີ່ມ: ${escapeHtml(vj.startDate)}</span><span>🕐 ສິ້ນສຸດ: ${escapeHtml(vj.lastLive || '—')}</span></div>
    </div>`;
}

let _newVjActiveCache = null;
let _newVjActiveLoading = false;
async function fetchNewVjActiveData(monthKey){
  if(_newVjActiveLoading) return;
  _newVjActiveLoading = true;
  try{
    const res = await gasCall('getNewVjActiveData', monthKey || State.activeLiveMonth || null);
    if(res && !res.error){
      _newVjActiveCache = Array.isArray(res.list) ? res.list : [];
      if(Array.isArray(res.months) && res.months.length) State.liveMonths = res.months;
      State.activeLiveMonth = res.month || State.activeLiveMonth;
    } else { _newVjActiveCache = null; toast((res&&res.error)||'ໂຫລດຂໍ້ມູນບໍ່ສຳເລັດ','error'); }
  }catch(e){ _newVjActiveCache = null; toast(e.message || 'ໂຫລດຂໍ້ມູນບໍ່ສຳເລັດ','error'); }
  _newVjActiveLoading = false;
  if(State.view === 'newvjactive'){ document.getElementById('main').innerHTML = renderNewVjActive(); afterRenderHook(); }
}
function renderNewVjActive(){
  if(!_newVjActiveCache && !_newVjActiveLoading){ fetchNewVjActiveData(); return skeletonHtml(); }
  if(_newVjActiveLoading && !_newVjActiveCache) return skeletonHtml();
  const list = _newVjActiveCache || [];
  const totalBonus = list.reduce((a,v)=>a+(v.bonus||0),0);
  const metCount = list.filter(v=>v.met).length;
  return `
    <div class="page-head fade-in">
      <p class="eyebrow">Live Data</p>
      <h1>🌟 ໂບນັດ Active VJ ໃໝ່</h1>
      <p>VJ ໃໝ່ (2 ເດືອນທຳອິດ) — ${list.length} ຄົນ${State.activeLiveMonth?(' · '+escapeHtml((State.liveMonths.find(m=>m.key===State.activeLiveMonth)||{}).label||'')):''}</p>
    </div>
    ${State.liveMonths && State.liveMonths.length ? `<div class="chip-row">${State.liveMonths.map(m => `<button class="chip ${m.key===State.activeLiveMonth?'active':''}" onclick="State.activeLiveMonth='${m.key}'; _newVjActiveCache=null; fetchNewVjActiveData('${m.key}');">${escapeHtml(m.label)}</button>`).join('')}</div>` : ''}
    ${State.isAdmin ? `<div class="stat-grid" style="margin-bottom:14px;"><div class="stat-card"><div class="l">VJ ໃໝ່ທັງໝົດ</div><div class="v">${list.length}</div></div><div class="stat-card"><div class="l">ຮອດເງື່ອນໄຂ</div><div class="v mint">${metCount}</div></div><div class="stat-card"><div class="l">Beans ໂບນັດລວມ</div><div class="v gold">${fmtInt(totalBonus)}</div></div></div>` : ''}
    <div class="search-bar" style="margin-bottom:10px;">
      ${ICONS.search}
      <input id="vjSearchInput" type="text" placeholder="ຄົ້ນຫາ Bigo ID ຫຼື ຊື່..." value="${escapeHtml(State.searchQuery)}" oninput="State.searchQuery=this.value; document.getElementById('newVjActiveList').innerHTML = renderNewVjActiveListInner();">
      <button class="btn btn-ghost btn-sm" onclick="_newVjActiveCache=null; fetchNewVjActiveData(State.activeLiveMonth); toast('ກຳລັງ Refresh...','info');">🔄</button>
    </div>
    <div id="newVjActiveList">${renderNewVjActiveListInner()}</div>`;
}
function renderNewVjActiveListInner(){
  const list = _newVjActiveCache || [];
  const q = (State.searchQuery||'').trim().toLowerCase();
  const filtered = q ? list.filter(v => String(v.bigoId).toLowerCase().includes(q) || (v.vjName||'').toLowerCase().includes(q)) : list;
  if(!filtered.length) return `<div class="empty-state"><p>ບໍ່ພົບ VJ ໃໝ່</p></div>`;
  return filtered.map(vj => `
    <div class="card" style="margin-bottom:10px; padding:14px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div class="vj-avatar">${initials(vj.bigoId)}</div>
        <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14.5px;">${escapeHtml(vj.vjName||vj.bigoId)}</div><div style="font-size:11.5px;color:var(--text-low);">${escapeHtml(vj.bigoId)} · ເດືອນທີ ${vj.supportMonthIndex} ຂອງການສະໜັບສະໜູນ</div></div>
        <span style="background:${vj.met?'rgba(45,212,168,0.15)':'rgba(255,107,94,0.12)'};color:${vj.met?'var(--mint)':'var(--coral)'};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">${vj.met?'✅ ຮອດເງື່ອນໄຂ':'⚠️ ຍັງບໍ່ຮອດ'}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:13px;font-weight:700;color:var(--gold);">${fmtInt(vj.beansMonth)}</div><div style="font-size:10px;color:var(--text-low);">Beans</div></div>
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:13px;font-weight:700;">${(vj.hoursMonth||0).toFixed(1)}h</div><div style="font-size:10px;color:var(--text-low);">ຊົ່ວໂມງ</div></div>
        <div style="background:var(--ink);border-radius:10px;padding:8px;text-align:center;"><div style="font-family:var(--f-mono);font-size:13px;font-weight:700;color:var(--mint);">${fmtInt(vj.bonus)}</div><div style="font-size:10px;color:var(--text-low);">ໂບນັດ beans</div></div>
      </div>
      <div style="font-size:11px;color:var(--text-low);margin-top:8px;">ຂັ້ນທີ່ຮອດ: ${escapeHtml(vj.tierLabel)}</div>
    </div>`).join('');
}

async function runConnectionCheck() {
  const resultDiv = document.getElementById('connDiagResult');
  if(!resultDiv) return;
  resultDiv.innerHTML = `<div class="skeleton" style="height:80px;"></div>`;
  try {
    const res = await gasCall('checkConnection');
    if(res.ok){
      resultDiv.innerHTML = `
        <div style="font-size:12px; line-height:1.8;">
          <div>✅ <b>Sheet:</b> ${escapeHtml(res.spreadsheetName)}</div>
          <div>📋 <b>Tabs ທັງໝົດ:</b> ${escapeHtml(JSON.stringify(res.sheetNames))}</div>
          <div>📅 <b>Months found:</b> ${escapeHtml(JSON.stringify(res.monthsFound))}</div>
          ${res.latestSample ? `<div>📊 <b>Latest:</b> ${escapeHtml(res.latestSample.month)} — ${res.latestSample.vjCount} VJ</div>` : '<div>⚠️ ບໍ່ພົບ month data</div>'}
          <div style="color:var(--text-low);">⏰ ${escapeHtml(res.timestamp)}</div>
        </div>`;
      if(res.monthsFound && res.monthsFound.length > 0){
        toast('ພົບ ' + res.monthsFound.length + ' ເດືອນ — ກຳລັງ sync...', 'info');
        await refreshData(false);
        resultDiv.innerHTML += `<div style="color:var(--mint);margin-top:6px;font-weight:700;">✅ Sync ສຳເລັດ!</div>`;
      } else {
        resultDiv.innerHTML += `<div style="color:var(--coral);margin-top:8px;">⚠️ ບໍ່ພົບ month tabs — ກວດຊື່ sheet tab ໃນ Google Sheet</div>`;
      }
    } else {
      resultDiv.innerHTML = `<div style="color:var(--coral);">❌ Error: ${escapeHtml(res.error)}</div>`;
    }
  } catch(e) {
    resultDiv.innerHTML = `<div style="color:var(--coral);">❌ Call failed: ${escapeHtml(e.message||String(e))}</div>`;
  }
}
</script>
</body>
</html>
