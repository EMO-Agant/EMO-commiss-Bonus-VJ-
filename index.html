      <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;">
        <span class="text-low mono" style="font-size:11px;width:20px;">${i+1}</span>
        <input type="text" value="${escapeHtml(t.name)}" style="flex:1;background:none;border:none;color:var(--gold);font-weight:700;font-size:12.5px;" onchange="renameTeamDraftEntry(${i}, this.value)">
        <button class="icon-btn" style="width:24px;height:24px;color:var(--coral);flex-shrink:0;" onclick="removeTeamDraftEntry(${i})">${ICONS.close}</button>
      </div>
      <div style="font-size:11.5px; color:var(--text-mid); padding-left:26px;">${(t.members||[]).map(m=>escapeHtml(m.vjName||m.bigoId)).join(', ')}</div>
    </div>`).join('') : `<div class="empty-state" style="padding:14px;"><p>ຍັງບໍ່ມີທີມ — ກົດ "ສຸ່ມແບ່ງກຸ່ມໃໝ່"</p></div>`;
}
function refreshTeamWheel(){
  let items = [];
  _pkFamilyTeamsDraft.forEach(t => {
    (t.members||[]).forEach(m => items.push(m.vjName || m.bigoId));
  });
  if(!items.length) items = ['ວ່າງ'];
  createSpinWheel('teamWheelCanvas', items, ()=>{});
}
function renameTeamDraftEntry(i, newName){
  if(!_pkFamilyTeamsDraft[i]) return;
  _pkFamilyTeamsDraft[i].name = newName.trim() || _pkFamilyTeamsDraft[i].name;
  refreshTeamWheel();
}
function removeTeamDraftEntry(i){
  _pkFamilyTeamsDraft.splice(i,1);
  renderTeamEntryList(); refreshTeamWheel();
}
async function reshuffleTeamsFromPool(){
  const pool = ((_pkFamilyCache && _pkFamilyCache.pool) || []).slice();
  if(pool.length < 3){ toast('ຕ້ອງມີ VJ ໃນ pool ຢ່າງໜ້ອຍ 3 ຄົນ (ໄປແທບ 0️⃣ ກ່ອນ)','error'); return; }

  // ★ ໝູນວົງລໍ້ດ້ວຍລາຍຊື່ VJ ທັງໝົດກ່ອນ
  const poolNames = pool.map(v => v.vjName || v.bigoId);
  const wheel = createSpinWheel('teamWheelCanvas', poolNames, ()=>{});
  wheel.spin();
  await new Promise(r=>setTimeout(r, 4300)); // ລໍໃຫ້ animation ຈົບ (ຄືກັນກັບ spinPkFamilyMatchup)

  const shuffled = pool.slice().sort(()=>Math.random()-0.5);
  const groupCount = Math.ceil(shuffled.length/3);
  _pkFamilyTeamsDraft = [];
  for(let g=0; g<groupCount; g++){
    _pkFamilyTeamsDraft.push({ id:'team_'+Date.now()+'_'+g, name:'Group '+String.fromCharCode(65+g), members: shuffled.slice(g*3,g*3+3) });
  }
  renderTeamEntryList(); refreshTeamWheel();
}
async function submitPkFamilyTeamsDraft(){
  try{
    await gasCall('adminSavePkFamilyTeams', State.adminPassword, _pkFamilyTeamsDraft);
    _pkFamilyCache.teams = _pkFamilyTeamsDraft.slice();
    toast('ບັນທຶກທີມສຳເລັດ','success');
    setView('admin-pkfamily');
  }catch(e){ toast(e.message||'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}

/* ---------- ແທບ 2️⃣ ໝູນສຸ່ມຈັບຄູ່ (inline, ຄືແທບ 0️⃣) ---------- */
function renderPkFamilySpinSection(){
  const teams = (_pkFamilyCache && _pkFamilyCache.teams) || [];
  return `
    <div class="card pkfamily-card-white" style="margin-top:14px;">
      <b>2️⃣ ໝູນສຸ່ມຈັບຄູ່ (Spin) — ຮອບໃໝ່</b>
      <p class="text-low" style="font-size:12px; margin:6px 0 12px;">ເລືອກທີມທີ່ຈະເຂົ້າຮອບນີ້ (ຄວນເປັນເລກຄູ່ ເຊັ່ນ 8, 4, 2 ທີມ) ແລ້ວກົດ Spin ເພື່ອສຸ່ມຈັບຄູ່</p>
      <div class="pkfamily-wheel-row">
        <canvas id="matchupWheel" width="340" height="340" style="flex-shrink:0;"></canvas>
        <div class="pkfamily-side">
          <div id="pkFamilySpinPool" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            ${teams.length ? teams.map(t=>`<label style="display:flex; align-items:center; gap:5px; background:var(--ink-3); border:1px solid var(--line); border-radius:20px; padding:5px 12px; font-size:12.5px; cursor:pointer;">
              <input type="checkbox" class="pkFamilySpinCheck" value="${t.id}" checked style="accent-color:var(--gold);" onchange="refreshMatchupWheel()"> ${escapeHtml(t.name)}
            </label>`).join('') : `<div class="empty-state" style="padding:14px;"><p>ຍັງບໍ່ມີທີມ — ຈັດຕັ້ງທີມກ່ອນໃນຂໍ້ 1️⃣</p></div>`}
          </div>
          <div id="pkFamilySpinResult" style="font-size:12.5px; color:var(--mint); font-weight:700; margin-bottom:8px;"></div>
        </div>
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="spinPkFamilyMatchup()">🎡 ໝູນສຸ່ມຈັບຄູ່</button>
    </div>`;
}
function refreshMatchupWheel(){
  const checks = document.querySelectorAll('.pkFamilySpinCheck:checked');
  const teamsById = {}; ((_pkFamilyCache && _pkFamilyCache.teams)||[]).forEach(t=>teamsById[t.id]=t);
  const items = checks.length ? Array.from(checks).map(c=>teamsById[c.value]?.name || '-') : ['ວ່າງ'];
  createSpinWheel('matchupWheel', items, ()=>{});
}

async function spinPkFamilyMatchup(){
  const checks = document.querySelectorAll('.pkFamilySpinCheck:checked');
  const teamIds = Array.from(checks).map(c=>c.value);
  if(teamIds.length < 2 || teamIds.length % 2 !== 0){
    toast('ກະລຸນາເລືອກທີມເປັນຈຳນວນຄູ່ (2,4,8...)','error'); return;
  }
  const teamsById = {}; (_pkFamilyCache.teams||[]).forEach(t=>teamsById[t.id]=t);
  const wheel = createSpinWheel('matchupWheel', teamIds.map(id=>teamsById[id].name), ()=>{});
  wheel.spin();
  await new Promise(r=>setTimeout(r, 4300));

  const shuffled = teamIds.slice();
  for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
  const matches = [];
  for(let i=0;i<shuffled.length;i+=2){
    matches.push({ matchId: 'm_'+Date.now()+'_'+i, teamAId: shuffled[i], teamBId: shuffled[i+1], time: '', winnerId: '' });
  }
  const roundIndex = (_pkFamilyCache.rounds||[]).length;
  try{
    await gasCall('adminSavePkFamilyRound', State.adminPassword, roundIndex, matches);
    if(!_pkFamilyCache.rounds) _pkFamilyCache.rounds = [];
    _pkFamilyCache.rounds[roundIndex] = matches;
    const resultEl = document.getElementById('pkFamilySpinResult');
    if(resultEl) resultEl.textContent = `✅ ຈັບຄູ່ສຳເລັດ! ${matches.length} ຄູ່`;
    toast('ຈັບຄູ່ Round ໃໝ່ສຳເລັດ','success');
    setTimeout(()=>setView('admin-pkfamily'), 900);
  }catch(e){ toast(e.message||'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}

function renderPoolEntryList(){
  const el = document.getElementById('poolEntryList');
  if(!el) return;
  el.innerHTML = _pkFamilyPoolDraft.length ? _pkFamilyPoolDraft.map((v,i)=>`
    <div class="pkfamily-pool-row" style="margin-bottom:8px; background:var(--ink); border:1px solid var(--line); border-radius:10px; padding:6px 8px;">
      <span class="text-low mono" style="font-size:11px;width:20px;">${i+1}</span>
      <input type="text" value="${escapeHtml(v.vjName||v.bigoId)}" style="background:none;border:none;color:var(--text-hi);font-size:12.5px;" onchange="renamePoolDraftEntry(${i}, this.value)">
      <select style="background:var(--ink-3); border:1px solid var(--line); border-radius:6px; font-size:11px; color:var(--text-mid); max-width:150px;" onchange="if(this.value) swapPoolDraftEntry(${i}, this.value); this.value='';">
        <option value="">ປ່ຽນເປັນ...</option>
        ${(_vjLiveCache||[]).map(lv=>`<option value="${escapeHtml(lv.bigoId)}">${escapeHtml(lv.vjName||lv.bigoId)}</option>`).join('')}
      </select>
      <button class="icon-btn" style="width:26px;height:26px;color:var(--coral);flex-shrink:0;" onclick="removeFromPoolDraft(${i})">${ICONS.close}</button>
    </div>`).join('') : `<div class="empty-state" style="padding:14px;"><p>ຍັງບໍ່ມີລາຍຊື່ — ເພີ່ມຈາກລຸ່ມນີ້ ຫຼື ກົດ "ສຸ່ມຈາກ Live VJ"</p></div>`;
}

function refreshPoolWheel(){
  const items = _pkFamilyPoolDraft.length ? _pkFamilyPoolDraft.map(v=>v.vjName||v.bigoId) : ['ວ່າງ'];
  createSpinWheel('poolWheelCanvas', items, ()=>{});
}

function addVjToPoolDraft(){
  const sel = document.getElementById('poolAddVjSelect');
  const bigoId = sel.value;
  if(!bigoId){ toast('ກະລຸນາເລືອກ VJ','error'); return; }
  if(_pkFamilyPoolDraft.some(v=>v.bigoId===bigoId)){ toast('VJ ນີ້ຢູ່ໃນລາຍຊື່ແລ້ວ','error'); return; }
  if(_pkFamilyPoolDraft.length>=24){ toast('ຄົບ 24 ຄົນແລ້ວ','error'); return; }
  const vjData = (_vjLiveCache||[]).find(v=>v.bigoId===bigoId);
  _pkFamilyPoolDraft.push({ bigoId, vjName: vjData?vjData.vjName:bigoId, photoUrl: findPhotoUrlByBigoId(bigoId) });
  renderPoolEntryList(); refreshPoolWheel();
  sel.value='';
}
function renamePoolDraftEntry(i, newName){
  if(!_pkFamilyPoolDraft[i]) return;
  _pkFamilyPoolDraft[i].vjName = newName.trim() || _pkFamilyPoolDraft[i].bigoId;
  refreshPoolWheel();
}
function swapPoolDraftEntry(i, newBigoId){
  const vjData = (_vjLiveCache||[]).find(v=>v.bigoId===newBigoId);
  if(!vjData) return;
  _pkFamilyPoolDraft[i] = { bigoId:newBigoId, vjName:vjData.vjName||newBigoId, photoUrl: findPhotoUrlByBigoId(newBigoId) };
  renderPoolEntryList(); refreshPoolWheel();
  toast('ປ່ຽນ VJ ສຳເລັດ (ຍັງບໍ່ໄດ້ບັນທຶກ)','info');
}
function removeFromPoolDraft(i){
  _pkFamilyPoolDraft.splice(i,1);
  renderPoolEntryList(); refreshPoolWheel();
}
function reshufflePoolDraftFromLive(){
  const allVj = (_vjLiveCache||[]).map(v=>({bigoId:v.bigoId, vjName:v.vjName, photoUrl:findPhotoUrlByBigoId(v.bigoId)}));
  _pkFamilyPoolDraft = allVj.slice().sort(()=>Math.random()-0.5).slice(0,24);
  renderPoolEntryList(); refreshPoolWheel();
}
async function submitPkFamilyPool(){
  try{
    await gasCall('adminSavePkFamilyPool', State.adminPassword, _pkFamilyPoolDraft);
    _pkFamilyCache.pool = _pkFamilyPoolDraft.slice();
    toast('ບັນທຶກລາຍຊື່ VJ ສຳເລັດ','success');
  }catch(e){ toast(e.message||'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}

function openGroupAssignWheelModal(){
  const pool = (_pkFamilyCache.pool||[]).slice();
  if(pool.length < 3){ toast('ຕ້ອງມີ VJ ໃນ pool ຢ່າງໜ້ອຍ 3 ຄົນ','error'); return; }
  openModal(`
    <div class="modal-head"><h3>🎡 ສຸ່ມແບ່ງເຂົ້າກຸ່ມ</h3><button class="icon-btn" onclick="closeModal()">${ICONS.close}</button></div>
    <canvas id="groupAssignWheel" width="260" height="260" style="display:block;margin:0 auto;"></canvas>
    <div id="groupAssignResult" style="margin-top:10px; font-size:12.5px;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ຍົກເລີກ</button>
      <button class="btn btn-primary" onclick="submitGroupAssign()">${ICONS.check} ບັນທຶກກຸ່ມ</button>
    </div>`);
  const shuffled = pool.slice().sort(()=>Math.random()-0.5);
  const groupCount = Math.ceil(shuffled.length/3);
  window._groupAssignDraft = [];
  for(let g=0; g<groupCount; g++){
    window._groupAssignDraft.push({ id:'team_'+Date.now()+'_'+g, name:'Group '+String.fromCharCode(65+g), members: shuffled.slice(g*3,g*3+3) });
  }
  createSpinWheel('groupAssignWheel', shuffled.map(v=>v.vjName||v.bigoId), ()=>{});
  document.getElementById('groupAssignResult').innerHTML = window._groupAssignDraft.map(t=>
    `<div><b>${t.name}:</b> ${t.members.map(m=>escapeHtml(m.vjName||m.bigoId)).join(', ')}</div>`).join('');
}
async function submitGroupAssign(){
  try{
    await gasCall('adminSavePkFamilyTeams', State.adminPassword, window._groupAssignDraft);
    _pkFamilyCache.teams = window._groupAssignDraft;
    toast('ແບ່ງກຸ່ມສຳເລັດ','success');
    closeModal(); setView('admin-pkfamily');
  }catch(e){ toast(e.message||'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}


async function setPkFamilyWinner(roundIndex, matchId, winnerId){
  if(!winnerId) return;
  try{
    await gasCall('adminSetPkFamilyWinner', State.adminPassword, roundIndex, matchId, winnerId);
    toast('ບັນທຶກຜົນສຳເລັດ','success');
    fetchPkFamilyData();
  }catch(e){ toast(e.message||'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}
async function setPkFamilyMatchTime(roundIndex, matchId, time){
  try{
    await gasCall('adminSetPkFamilyMatchTime', State.adminPassword, roundIndex, matchId, time);
    toast('ບັນທຶກເວລາສຳເລັດ','success');
    fetchPkFamilyData();
  }catch(e){ toast(e.message||'ບັນທຶກບໍ່ສຳເລັດ','error'); }
}

function confirmResetPkFamily(){
  openModal(`
    <div class="modal-head"><h3>ລ້າງຂໍ້ມູນ PK Family?</h3><button class="icon-btn" onclick="closeModal()">${ICONS.close}</button></div>
    <p class="text-low">ຈະລຶບທີມ ແລະ ຮອບການແຂ່ງຂັນທັງໝົດ ຖາວອນ.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ຍົກເລີກ</button>
      <button class="btn btn-danger" onclick="submitResetPkFamily()">${ICONS.trash} ລ້າງເລີຍ</button>
    </div>`);
}
async function submitResetPkFamily(){
  try{
    await gasCall('adminResetPkFamily', State.adminPassword);
    _pkFamilyCache = { teams:[], rounds:[] };
    toast('ລ້າງຂໍ້ມູນສຳເລັດ','success');
    closeModal();
    setView('admin-pkfamily');
  }catch(e){ toast(e.message||'ລ້າງບໍ່ສຳເລັດ','error'); }
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
